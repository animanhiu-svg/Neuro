<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Конструктор персонажа · CyberDNA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0F0F0F;
            background-image: radial-gradient(circle at 30% 10%, rgba(100, 0, 255, 0.05) 0%, transparent 50%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            line-height: 1.4;
            font-weight: 400;
        }

        /* шрифт Inter */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        .container {
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* заголовок */
        .title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #d4b0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        /* аватар-блок */
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
        }
        .avatar-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1A1A1A;
            border: 2px solid rgba(156, 39, 176, 0.5);
            box-shadow: 0 0 20px rgba(156, 39, 176, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
            cursor: pointer;
        }
        .avatar-circle:hover {
            border-color: #aa00ff;
            box-shadow: 0 0 30px #9c27b0;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 10px #9c27b0; }
            50% { box-shadow: 0 0 25px #aa00ff; }
            100% { box-shadow: 0 0 10px #9c27b0; }
        }
        .avatar-placeholder {
            font-size: 36px;
            filter: drop-shadow(0 0 8px #9c27b0);
        }
        .avatar-label {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #b388ff;
            background: rgba(156, 39, 176, 0.15);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(156, 39, 176, 0.3);
            backdrop-filter: blur(4px);
        }

        /* блоки карточек */
        .card {
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(156, 39, 176, 0.3);
            border-radius: 24px;
            padding: 18px 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .card:focus-within {
            border-color: #9c27b0;
            box-shadow: 0 0 20px rgba(156, 39, 176, 0.4);
        }

        .card-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b388ff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-label span {
            background: #9c27b0;
            color: #0F0F0F;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 800;
        }

        /* поле ввода */
        input, textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            color: #fff;
            resize: vertical;
        }
        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.25);
            font-weight: 400;
        }

        /* имя и пол в ряд */
        .row-fields {
            display: flex;
            gap: 12px;
        }
        .row-fields .card {
            flex: 1;
        }

        /* переключатели пола (чипсы) */
        .gender-chips {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(156, 39, 176, 0.4);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 15px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            transition: all 0.2s;
            cursor: pointer;
            text-align: center;
            flex: 1;
        }
        .chip.active {
            background: #9c27b0;
            border-color: #ce93ff;
            color: #fff;
            box-shadow: 0 0 15px #9c27b0;
        }

        /* счетчик символов */
        .char-counter {
            text-align: right;
            font-size: 11px;
            color: #b388ff;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        /* легенда - большой блок */
        .legend textarea {
            min-height: 90px;
        }

        /* нижние кнопки */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 18px 0;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #9c27b0;
            color: #b388ff;
        }
        .btn-outline:hover {
            background: rgba(156, 39, 176, 0.2);
            box-shadow: 0 0 15px #9c27b0;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
            color: white;
            box-shadow: 0 4px 20px rgba(156, 39, 176, 0.5);
            border: none;
        }
        .btn-gradient:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 25px #9c27b0;
        }
        .btn-gradient:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* лоадер */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .loader-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .loader-content {
            background: #1a1a2a;
            border: 1px solid #9c27b0;
            border-radius: 40px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 0 60px #9c27b0;
            animation: glow 1.5s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 30px #9c27b0; }
            to { box-shadow: 0 0 60px #aa00ff; }
        }
        .loader-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #e0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loader-sub {
            margin-top: 12px;
            font-size: 14px;
            color: #b388ff;
        }

        /* прочая мелочь */
        .glass-icon {
            font-size: 18px;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">⛓️ СОЗДАЙ ДНК</div>

        <!-- Аватар блок -->
        <div class="avatar-section">
            <div class="avatar-circle" id="avatarCircle">
                <span class="avatar-placeholder">🧬</span>
            </div>
            <div class="avatar-label">ЗАГРУЗИТЬ ДНК ПЕРСОНАЖА</div>
        </div>

        <!-- Имя и пол в ряд -->
        <div class="row-fields">
            <div class="card" style="padding: 12px 16px;">
                <div class="card-label">ИМЯ</div>
                <input type="text" id="nameInput" placeholder="например: Нейромант" maxlength="30">
            </div>
            <div class="card" style="padding: 12px 16px;">
                <div class="card-label">ПОЛ</div>
                <div class="gender-chips" id="genderChips">
                    <div class="chip" data-gender="male">♂ М</div>
                    <div class="chip" data-gender="female">♀ Ж</div>
                    <div class="chip" data-gender="other">⚥</div>
                </div>
            </div>
        </div>

        <!-- Прошивка личности (приветствие) -->
        <div class="card">
            <div class="card-label">
                <span class="glass-icon">🧠</span> ПРОШИВКА ЛИЧНОСТИ <span>приветствие</span>
            </div>
            <input type="text" id="greetingInput" placeholder="Первая фраза твоего героя..." maxlength="100">
            <div class="char-counter" id="greetingCounter">0/100</div>
        </div>

        <!-- Легенда (описание) -->
        <div class="card legend">
            <div class="card-label">
                <span class="glass-icon">📜</span> ЛЕГЕНДА
            </div>
            <textarea id="legendInput" placeholder="Глубокая история, характер, мотивы..." rows="4" maxlength="500"></textarea>
            <div class="char-counter" id="legendCounter">0/500</div>
        </div>

        <!-- Нижние кнопки -->
        <div class="action-buttons">
            <button class="btn btn-outline" id="resetBtn">СБРОС</button>
            <button class="btn btn-gradient" id="activateBtn">АКТИВИРОВАТЬ</button>
        </div>
    </div>

    <!-- Оверлей загрузки -->
    <div class="loader-overlay" id="loader">
        <div class="loader-content">
            <div class="loader-text">СИНХРОНИЗАЦИЯ</div>
            <div class="loader-sub">с нейросетью Dolphin 24B ...</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            // Инициализация Telegram
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // Элементы
            const avatarCircle = document.getElementById('avatarCircle');
            const nameInput = document.getElementById('nameInput');
            const greetingInput = document.getElementById('greetingInput');
            const legendInput = document.getElementById('legendInput');
            const greetingCounter = document.getElementById('greetingCounter');
            const legendCounter = document.getElementById('legendCounter');
            const genderChips = document.querySelectorAll('.chip');
            const resetBtn = document.getElementById('resetBtn');
            const activateBtn = document.getElementById('activateBtn');
            const loader = document.getElementById('loader');

            // Активный пол
            let activeGender = 'male'; // по умолчанию
            genderChips.forEach(chip => {
                chip.addEventListener('click', function() {
                    genderChips.forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    activeGender = this.dataset.gender;
                });
            });
            // установить начальный active
            document.querySelector('.chip[data-gender="male"]').classList.add('active');

            // Счётчики
            function updateCounters() {
                greetingCounter.textContent = `${greetingInput.value.length}/100`;
                legendCounter.textContent = `${legendInput.value.length}/500`;
            }
            greetingInput.addEventListener('input', updateCounters);
            legendInput.addEventListener('input', updateCounters);
            updateCounters();

            // Сброс
            resetBtn.addEventListener('click', function() {
                nameInput.value = '';
                greetingInput.value = '';
                legendInput.value = '';
                genderChips.forEach(c => c.classList.remove('active'));
                document.querySelector('.chip[data-gender="male"]').classList.add('active');
                activeGender = 'male';
                updateCounters();
                // лёгкая вспышка (опционально)
                tg.HapticFeedback?.impactOccurred('light');
            });

            // Активация (анимация + вывод в консоль)
            activateBtn.addEventListener('click', function() {
                // Собираем данные
                const characterData = {
                    name: nameInput.value.trim() || 'Безымянный',
                    gender: activeGender,
                    greeting: greetingInput.value.trim() || 'Привет, мир...',
                    legend: legendInput.value.trim() || 'Нет легенды'
                };

                // Показываем лоадер
                loader.classList.add('show');
                tg.HapticFeedback?.impactOccurred('medium');

                // Имитация синхронизации
                setTimeout(() => {
                    loader.classList.remove('show');
                    // Вывод в консоль (для отладки)
                    console.log('Персонаж активирован:', characterData);
                    // Здесь потом будет tg.sendData(JSON.stringify(characterData))
                    tg.HapticFeedback?.notificationOccurred('success');
                    // Покажем алерт (можно убрать)
                    tg.showAlert(`Персонаж "${characterData.name}" готов. (Данные в консоли)`);
                }, 2000);
            });

            // Доп. опции: аватар клик — имитация загрузки
            avatarCircle.addEventListener('click', function() {
                tg.HapticFeedback?.impactOccurred('light');
                tg.showAlert('Функция загрузки изображения будет добавлена позже.');
            });

        })();
    </script>
</body>
</html>
