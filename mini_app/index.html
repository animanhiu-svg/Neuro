<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест связи</title>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: sans-serif;
            padding: 20px;
            text-align: center;
        }
        button {
            background: #2481cc;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        input {
            padding: 10px;
            width: 80%;
            border-radius: 30px;
            border: none;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h1>Тест связи с сервером</h1>
    <input type="text" id="message" placeholder="Введите сообщение">
    <button id="send">Отправить</button>
    <div id="result"></div>

    <script>
        document.getElementById('send').addEventListener('click', function() {
            const msg = document.getElementById('message').value;
            const chatId = 123456; // тестовый ID
            fetch('https://neuro-12pd.onrender.com/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, message: msg })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('result').innerHTML = '<p>Ответ: ' + (data.reply || 'нет данных') + '</p>';
            })
            .catch(err => {
                document.getElementById('result').innerHTML = '<p>Ошибка: ' + err.message + '</p>';
            });
        });
    </script>
</body>
</html>
