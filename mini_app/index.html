<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroBro · портал</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #fff;
            min-height: 100vh;
        }

        /* сплэш */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s;
        }
        #splash-screen.hidden { opacity: 0; pointer-events: none; }
        .splash-avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: #1e1e1e;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .splash-avatar span { font-size: 48px; color: #fff; }
        .splash-name { font-size: 32px; font-weight: 600; color: #fff; margin-bottom: 16px; }
        .splash-quote { font-size: 12px; color: #aaa; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        .progress-container { width: 200px; height: 2px; background: #333; }
        .progress-fill { height: 100%; width: 0%; background: #fff; transition: width 3s linear; }

        #main-content {
            opacity: 0;
            transition: opacity 0.5s;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #main-content.visible { opacity: 1; }
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
        }

        /* нижняя панель */
        .bottom-bar {
            display: flex;
            justify-content: space-around;
            background: #000;
            padding: 8px 0 12px;
            position: relative;
            border-top: none;
        }
        .bottom-bar::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.8), transparent);
        }
        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            font-size: 10px;
            opacity: 0.7;
            transition: transform 0.1s, opacity 0.2s;
            cursor: pointer;
            flex: 1;
        }
        .bar-item.active { opacity: 1; }
        .bar-item:active { transform: scale(0.92); }
        .bar-item i { width: 24px; height: 24px; margin-bottom: 4px; stroke-width: 1.5; }

        /* портал */
        .portal-header { margin-bottom: 24px; }
        .portal-header h2 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .portal-header p { font-size: 14px; color: #aaa; margin-bottom: 12px; }
        .characters-list { display: flex; flex-direction: column; gap: 16px; }
        .character-card {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 12px;
            border: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .character-card:active { transform: scale(0.98); }
        .card-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-color: #333;
            flex-shrink: 0;
        }
        .card-info { flex: 1; }
        .card-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .card-desc { font-size: 12px; color: #aaa; }

        /* чат */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #333;
        }
        .chat-back {
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .chat-back:active { background: rgba(255,255,255,0.1); }
        .chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
        }
        .chat-name { font-size: 18px; font-weight: 600; }
        .messages {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }
        .message { display: flex; flex-direction: column; max-width: 80%; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.bot { align-self: flex-start; align-items: flex-start; }
        .message-bubble {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 14px;
            word-break: break-word;
        }
        .message.user .message-bubble { background: #2481cc; color: #fff; }
        .message-time { font-size: 10px; color: #888; margin-top: 4px; }
        .chat-input-container {
            display: flex;
            gap: 10px;
            margin-top: auto;
            background: #1e1e1e;
            border-radius: 30px;
            padding: 8px 12px;
            border: 1px solid #333;
        }
        .chat-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 14px; }
        .chat-send { background: transparent; border: none; color: #fff; cursor: pointer; padding: 6px; display: flex; align-items: center; }

        .placeholder-page { text-align: center; padding: 60px 20px; color: #aaa; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <div class="splash-avatar"><span>🧬</span></div>
        <div class="splash-name">NEURO BRO</div>
        <div class="splash-quote">ТИШИНА В ЧЕРНО-БЕЛОМ</div>
        <div class="progress-container"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div id="main-content">
        <div class="content-area" id="content-area"></div>
        <div class="bottom-bar">
            <div class="bar-item" data-tab="feed"><i data-lucide="globe"></i><span>Портал</span></div>
            <div class="bar-item" data-tab="chats"><i data-lucide="message-circle-more"></i><span>Чаты</span></div>
            <div class="bar-item" data-tab="center"><i data-lucide="circle-user"></i><span>Центр</span></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = Telegram.WebApp;
        tg.ready();
        tg.expand();

        const chatId = tg.initDataUnsafe.user?.id || 0;
        console.log('chatId:', chatId);

        // Простые персонажи
        const characters = [
            { name: "Айко", desc: "Кибер-воин, ищет напарника", avatar: "https://i.pravatar.cc/150?img=1" },
            { name: "Нейро", desc: "Загадочный хакер", avatar: "https://i.pravatar.cc/150?img=2" },
            { name: "Сакура", desc: "Целительница, добрая", avatar: "https://i.pravatar.cc/150?img=3" },
            { name: "Зеро", desc: "Андроид, ищет смысл", avatar: "https://i.pravatar.cc/150?img=4" }
        ];

        let currentChatName = null;
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function renderFeed() {
            const html = `
                <div class="portal-header">
                    <h2>Портал</h2>
                    <p>Найди своего героя</p>
                </div>
                <div class="characters-list" id="characters-list"></div>
            `;
            contentArea.innerHTML = html;
            const list = document.getElementById('characters-list');
            list.innerHTML = characters.map(c => `
                <div class="character-card" data-name="${escapeHtml(c.name)}" data-avatar="${c.avatar}">
                    <div class="card-avatar" style="background-image: url('${c.avatar}')"></div>
                    <div class="card-info">
                        <div class="card-name">${escapeHtml(c.name)}</div>
                        <div class="card-desc">${escapeHtml(c.desc)}</div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.character-card').forEach(card => {
                card.addEventListener('click', () => {
                    const name = card.dataset.name;
                    const avatar = card.dataset.avatar;
                    renderChat(name, avatar);
                });
            });
        }

        function renderChat(chatName, chatAvatar) {
            const storageKey = `chat_${chatName}`;
            let messages = [];
            try { messages = JSON.parse(localStorage.getItem(storageKey)) || []; } catch(e) {}

            const html = `
                <div class="chat-header">
                    <button class="chat-back" id="chat-back"><i data-lucide="arrow-left"></i> Назад</button>
                    <div class="chat-avatar" style="background-image: url('${chatAvatar}');"></div>
                    <div class="chat-name">${escapeHtml(chatName)}</div>
                </div>
                <div class="messages" id="chat-messages"></div>
                <div class="chat-input-container">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Написать...">
                    <button class="chat-send" id="chat-send"><i data-lucide="send"></i></button>
                </div>
            `;
            contentArea.innerHTML = html;
            lucide.createIcons();

            const messagesDiv = document.getElementById('chat-messages');
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('chat-send');
            const backBtn = document.getElementById('chat-back');

            messages.forEach(msg => addMessageElement(msg.text, msg.sender, msg.time));

            function scrollToBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
            function addMessageElement(text, sender, time) {
                const div = document.createElement('div');
                div.className = `message ${sender}`;
                div.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
                messagesDiv.appendChild(div);
                scrollToBottom();
            }

            function addMessage(text, sender) {
                const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                messages.push({ text, sender, time });
                localStorage.setItem(storageKey, JSON.stringify(messages));
                addMessageElement(text, sender, time);
                if (sender === 'user') {
                    sendToServer(text);
                }
            }

            async function sendToServer(text) {
                try {
                    const res = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: chatId, message: text })
                    });
                    const data = await res.json();
                    if (data.reply) {
                        addMessage(data.reply, 'bot');
                    } else {
                        addMessage('⚠️ Пустой ответ от сервера', 'bot');
                    }
                } catch (err) {
                    console.error(err);
                    addMessage('⚠️ Ошибка соединения с сервером', 'bot');
                }
            }

            sendBtn.addEventListener('click', () => {
                const text = input.value.trim();
                if (!text) return;
                addMessage(text, 'user');
                input.value = '';
            });
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });
            backBtn.addEventListener('click', () => renderFeed());
        }

        function renderChats() {
            contentArea.innerHTML = '<div class="placeholder-page">Скоро здесь будет список чатов</div>';
        }

        function renderCenter() {
            contentArea.innerHTML = '<div class="placeholder-page">Центр (конструктор позже)</div>';
        }

        const contentArea = document.getElementById('content-area');
        const barItems = document.querySelectorAll('.bar-item');

        barItems.forEach(item => {
            item.addEventListener('click', () => {
                barItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                const tab = item.dataset.tab;
                if (tab === 'feed') renderFeed();
                else if (tab === 'chats') renderChats();
                else if (tab === 'center') renderCenter();
                tg.HapticFeedback?.impactOccurred('light');
            });
        });

        // Сплэш анимация
        const splash = document.getElementById('splash-screen');
        const progressFill = document.getElementById('progress-fill');
        setTimeout(() => progressFill.style.width = '100%', 100);
        setTimeout(() => {
            splash.classList.add('hidden');
            document.getElementById('main-content').classList.add('visible');
            tg.HapticFeedback?.impactOccurred('medium');
        }, 3200);

        renderFeed();
        barItems[0].classList.add('active');
    </script>
</body>
</html>
