<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroBro · портал</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <style>
        /* все стили такие же, как в последнем стабильном варианте – я их не менял */
        /* вставь сюда свои стили, либо используй код из предыдущего сообщения */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #fff;
            min-height: 100vh;
        }
        /* ... (остальные стили – те же, что в предыдущей версии) ... */
        /* Чтобы не занимать место, я пропустил их, но они должны быть в полном коде */
    </style>
</head>
<body>
    <input type="file" id="file-input" accept="image/*">

    <div id="splash-screen">
        <div class="splash-avatar"><span>🧬</span></div>
        <div class="splash-name">NEURO BRO</div>
        <div class="splash-quote">ТИШИНА В ЧЕРНО-БЕЛОМ</div>
        <div class="progress-container"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div id="main-content">
        <div class="content-area" id="content-area"></div>
        <div class="bottom-bar">
            <div class="bar-item" data-tab="feed"><i data-lucide="globe"></i><span>Портал</span></div>
            <div class="bar-item" data-tab="chats"><i data-lucide="message-circle-more"></i><span>Чаты</span></div>
            <div class="bar-item" data-tab="center"><i data-lucide="circle-user"></i><span>Центр</span></div>
            <div class="bar-item" data-tab="games"><i data-lucide="layout-grid"></i><span>Игры</span></div>
            <div class="bar-item" data-tab="profile"><i data-lucide="menu"></i><span>Профиль</span></div>
        </div>
    </div>

    <div class="crop-modal" id="crop-modal">
        <div class="crop-container">
            <img src="" id="crop-image" class="crop-image">
        </div>
        <div class="crop-controls">
            <button class="crop-btn" id="crop-cancel">Отмена</button>
            <button class="crop-btn primary" id="crop-apply">Готово</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();

            const user_id = tg.initDataUnsafe.user?.id;
            const chat_id = (user_id && user_id !== 0) ? user_id : 7015403070; // замени на свой ID
            console.log('chat_id:', chat_id);

            // ---------- Данные конструктора ----------
            let character = {
                name: '',
                gender: 'male',
                greeting: '',
                subtitles: '',
                memory_cards: '',
                location: '',
                scenario: '',
                relation: '',
                photo: null
            };
            try {
                const saved = localStorage.getItem('neuroCharacter');
                if (saved) Object.assign(character, JSON.parse(saved));
            } catch(e) {}
            let photoData = localStorage.getItem('characterPhoto') || null;
            if (photoData) character.photo = photoData;

            function saveCharacterToLocal() {
                localStorage.setItem('neuroCharacter', JSON.stringify({
                    name: character.name,
                    gender: character.gender,
                    greeting: character.greeting,
                    subtitles: character.subtitles,
                    memory_cards: character.memory_cards,
                    location: character.location,
                    scenario: character.scenario,
                    relation: character.relation
                }));
                if (character.photo) localStorage.setItem('characterPhoto', character.photo);
                else localStorage.removeItem('characterPhoto');
            }

            // ---------- Кадрирование ----------
            const cropModal = document.getElementById('crop-modal');
            const cropImage = document.getElementById('crop-image');
            const cropCancel = document.getElementById('crop-cancel');
            const cropApply = document.getElementById('crop-apply');
            let cropper = null;
            let pendingFile = null;

            function openCrop(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    cropImage.src = e.target.result;
                    cropModal.classList.add('show');
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(cropImage, {
                        aspectRatio: 1,
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 1,
                        cropBoxMovable: false,
                        cropBoxResizable: false,
                        toggleDragModeOnDblclick: false,
                        background: false,
                        modal: false,
                        guides: false,
                        center: false,
                        highlight: false
                    });
                    pendingFile = file;
                };
                reader.readAsDataURL(file);
            }

            cropCancel.addEventListener('click', () => {
                cropModal.classList.remove('show');
                if (cropper) cropper.destroy();
                pendingFile = null;
            });

            cropApply.addEventListener('click', () => {
                if (!cropper || !pendingFile) return;
                const canvas = cropper.getCroppedCanvas({ width: 300, height: 300, imageSmoothingQuality: 'high' });
                const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                character.photo = croppedDataUrl;
                saveCharacterToLocal();
                cropModal.classList.remove('show');
                cropper.destroy();
                pendingFile = null;
                if (document.querySelector('.bar-item.active')?.dataset.tab === 'center') renderCenter();
            });

            // ---------- Чат ----------
            function addMessageToUI(container, text, sender, time) {
                const div = document.createElement('div');
                div.className = `message ${sender}`;
                div.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            async function sendMessageToServer(chatName, chatAvatar, text, messagesContainer, storageKey, onReply) {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message bot';
                typingDiv.innerHTML = '<div class="typing-indicator">✎ печатает...</div>';
                messagesContainer.appendChild(typingDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000);
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: chat_id, message: text }),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    const replyText = data.reply || '⚠️ Пустой ответ от сервера';
                    typingDiv.remove();
                    const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                    addMessageToUI(messagesContainer, replyText, 'bot', time);
                    let messages = [];
                    try { messages = JSON.parse(localStorage.getItem(storageKey)) || []; } catch(e) {}
                    messages.push({ text: replyText, sender: 'bot', time });
                    localStorage.setItem(storageKey, JSON.stringify(messages));
                    if (onReply) onReply(replyText);
                } catch (err) {
                    console.error(err);
                    typingDiv.remove();
                    const errorText = err.name === 'AbortError' ? '⚠️ Сервер не отвечает (таймаут)' : '⚠️ Ошибка соединения с сервером';
                    addMessageToUI(messagesContainer, errorText, 'bot', new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }));
                }
            }

            function ensureChatAvatar(chatName, avatar) {
                const avatarKey = `chat_avatar_${chatName}`;
                if (!localStorage.getItem(avatarKey)) {
                    localStorage.setItem(avatarKey, avatar);
                }
            }

            function renderChat(chatName, chatAvatar) {
                const storageKey = `chat_${chatName}`;
                let messages = [];
                try { messages = JSON.parse(localStorage.getItem(storageKey)) || []; } catch(e) {}
                ensureChatAvatar(chatName, chatAvatar);

                const html = `
                    <div class="chat-header">
                        <button class="chat-back" id="chat-back"><i data-lucide="arrow-left"></i> Назад</button>
                        <div class="chat-avatar" style="background-image: url('${chatAvatar}');"></div>
                        <div class="chat-name">${escapeHtml(chatName)}</div>
                    </div>
                    <div class="messages" id="chat-messages"></div>
                    <div class="chat-input-container">
                        <input type="text" class="chat-input" id="chat-input" placeholder="Написать...">
                        <button class="chat-send" id="chat-send"><i data-lucide="send"></i></button>
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();

                const messagesContainer = document.getElementById('chat-messages');
                const input = document.getElementById('chat-input');
                const sendBtn = document.getElementById('chat-send');
                const backBtn = document.getElementById('chat-back');

                messages.forEach(msg => addMessageToUI(messagesContainer, msg.text, msg.sender, msg.time));

                function addUserMessage(text) {
                    const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                    addMessageToUI(messagesContainer, text, 'user', time);
                    messages.push({ text, sender: 'user', time });
                    localStorage.setItem(storageKey, JSON.stringify(messages));
                }

                async function handleSend() {
                    const text = input.value.trim();
                    if (!text) return;
                    addUserMessage(text);
                    input.value = '';
                    await sendMessageToServer(chatName, chatAvatar, text, messagesContainer, storageKey, (reply) => {
                        messages.push({ text: reply, sender: 'bot', time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) });
                        localStorage.setItem(storageKey, JSON.stringify(messages));
                    });
                }

                sendBtn.addEventListener('click', handleSend);
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
                backBtn.addEventListener('click', () => renderFeed());
            }

            function getCreatedCharacters() {
                const chars = [];
                const saved = localStorage.getItem('neuroCharacter');
                if (saved) {
                    try {
                        const char = JSON.parse(saved);
                        if (char.name) {
                            chars.push({
                                name: char.name,
                                desc: char.subtitles || 'Нет описания',
                                avatar: character.photo || "https://i.pravatar.cc/150?img=0"
                            });
                        }
                    } catch(e) {}
                }
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('chat_') && !key.startsWith('chat_avatar_')) {
                        const chatName = key.slice(5);
                        if (!chars.some(c => c.name === chatName)) {
                            const avatarKey = `chat_avatar_${chatName}`;
                            let avatar = localStorage.getItem(avatarKey);
                            if (!avatar) avatar = "https://i.pravatar.cc/150?img=0";
                            chars.push({
                                name: chatName,
                                desc: 'Персонаж из чата',
                                avatar: avatar
                            });
                        }
                    }
                }
                return chars;
            }

            function renderFeed() {
                const createdChars = getCreatedCharacters();
                if (createdChars.length === 0) {
                    contentArea.innerHTML = `
                        <div class="portal-header">
                            <h2>Портал</h2>
                            <p>Создайте своего первого персонажа в центре</p>
                        </div>
                        <div class="empty-state">✨ Здесь будут ваши персонажи</div>
                    `;
                    lucide.createIcons();
                    return;
                }
                const html = `
                    <div class="portal-header">
                        <h2>Портал</h2>
                        <p>Найди своего героя</p>
                    </div>
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchInput" placeholder="Имя персонажа...">
                    </div>
                    <div id="charactersList" class="characters-list"></div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();

                const searchInput = document.getElementById('searchInput');
                const charactersList = document.getElementById('charactersList');

                function renderCharacters() {
                    const query = searchInput.value.toLowerCase();
                    let filtered = createdChars.filter(c => c.name.toLowerCase().includes(query));
                    if (filtered.length === 0) {
                        charactersList.innerHTML = '<div class="empty-state">✨ Ничего не найдено</div>';
                        return;
                    }
                    charactersList.innerHTML = filtered.map(c => `
                        <div class="character-card" data-name="${escapeHtml(c.name)}" data-avatar="${c.avatar}">
                            <div class="card-avatar" style="background-image: url('${c.avatar}');"></div>
                            <div class="card-info">
                                <div class="card-name">${escapeHtml(c.name)}</div>
                                <div class="card-desc">${escapeHtml(c.desc)}</div>
                            </div>
                        </div>
                    `).join('');
                    document.querySelectorAll('.character-card').forEach(card => {
                        card.addEventListener('click', () => {
                            const name = card.dataset.name;
                            const avatar = card.dataset.avatar;
                            renderChat(name, avatar);
                        });
                    });
                }

                searchInput.addEventListener('input', renderCharacters);
                renderCharacters();
            }

            function renderChats() {
                const chats = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('chat_') && !key.startsWith('chat_avatar_')) {
                        const chatName = key.slice(5);
                        const avatarKey = `chat_avatar_${chatName}`;
                        let avatar = localStorage.getItem(avatarKey);
                        if (!avatar) avatar = "https://i.pravatar.cc/150?img=0";
                        let lastMessage = "Нет сообщений";
                        let lastTime = "";
                        try {
                            const msgs = JSON.parse(localStorage.getItem(key)) || [];
                            if (msgs.length > 0) {
                                const last = msgs[msgs.length-1];
                                lastMessage = last.text;
                                lastTime = last.time;
                            }
                        } catch(e) {}
                        chats.push({
                            name: chatName,
                            avatar: avatar,
                            lastMessage: lastMessage,
                            lastTime: lastTime
                        });
                    }
                }
                if (chats.length === 0) {
                    contentArea.innerHTML = `
                        <div class="empty-chats">
                            <i data-lucide="message-circle" style="width:48px;height:48px;margin-bottom:16px;"></i>
                            <p>Нет чатов</p>
                            <p style="font-size:12px">Создайте персонажа в центре или начните диалог из портала</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }
                const html = `
                    <div class="chats-list">
                        ${chats.map(chat => `
                            <div class="chat-item" data-name="${escapeHtml(chat.name)}" data-avatar="${chat.avatar}">
                                <div class="chat-item-avatar" style="background-image: url('${chat.avatar}');"></div>
                                <div class="chat-item-info">
                                    <div class="chat-item-name">${escapeHtml(chat.name)}</div>
                                    <div class="chat-item-last">${escapeHtml(chat.lastMessage)}</div>
                                    ${chat.lastTime ? `<div style="font-size:10px; color:#666;">${chat.lastTime}</div>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();
                document.querySelectorAll('.chat-item').forEach(el => {
                    const name = el.dataset.name;
                    const avatar = el.dataset.avatar;
                    el.addEventListener('click', () => {
                        renderChat(name, avatar);
                    });
                });
            }

            function renderCenter() {
                const avatarHtml = character.photo
                    ? `<div class="avatar-circle" id="avatar-circle" style="background-image: url('${character.photo}');"></div>`
                    : `<div class="avatar-circle" id="avatar-circle"><div class="avatar-placeholder">🧬</div></div>`;

                const html = `
                    <div class="neuro-header"><h1>СОЗДАТЬ ПЕРСОНАЖА</h1></div>
                    <div class="avatar-block">
                        ${avatarHtml}
                        <div class="avatar-label" id="upload-label">[ ОБРАЗ ]</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ИМЯ ]</div>
                        <input type="text" class="input-field" id="nameInput" value="${escapeHtml(character.name)}" maxlength="30">
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ПОЛ ]</div>
                        <div class="gender-chips" id="genderChips">
                            <div class="chip ${character.gender === 'male' ? 'active' : ''}" data-gender="male">М</div>
                            <div class="chip ${character.gender === 'female' ? 'active' : ''}" data-gender="female">Ж</div>
                            <div class="chip ${character.gender === 'other' ? 'active' : ''}" data-gender="other">⚥</div>
                        </div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ПРИВЕТСТВИЕ ]</div>
                        <input type="text" class="input-field" id="greetingInput" value="${escapeHtml(character.greeting)}" maxlength="100">
                        <div class="char-counter" id="greetingCounter">${character.greeting?.length || 0}/100</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ОПИСАНИЕ (внешность, характер) ]</div>
                        <textarea class="input-textarea" id="subtitlesInput" rows="2" maxlength="500">${escapeHtml(character.subtitles)}</textarea>
                        <div class="char-counter" id="subtitlesCounter">${character.subtitles?.length || 0}/500</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ПАМЯТЬ (важные факты) ]</div>
                        <textarea class="input-textarea" id="memoryInput" rows="2" maxlength="500">${escapeHtml(character.memory_cards)}</textarea>
                        <div class="char-counter" id="memoryCounter">${character.memory_cards?.length || 0}/500</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ЛОКАЦИЯ ]</div>
                        <input type="text" class="input-field" id="locationInput" value="${escapeHtml(character.location)}" maxlength="100">
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ СЦЕНАРИЙ (начальная ситуация) ]</div>
                        <textarea class="input-textarea" id="scenarioInput" rows="2" maxlength="500">${escapeHtml(character.scenario)}</textarea>
                        <div class="char-counter" id="scenarioCounter">${character.scenario?.length || 0}/500</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ТВОЯ РОЛЬ (друг, враг, прохожий) ]</div>
                        <input type="text" class="input-field" id="relationInput" value="${escapeHtml(character.relation)}" maxlength="100">
                    </div>
                    <div class="main-buttons">
                        <button class="btn btn-outline" id="resetBtn">СБРОС</button>
                        <button class="btn btn-primary" id="activateBtn">СОЗДАТЬ</button>
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();

                const fileInput = document.getElementById('file-input');
                const avatarCircle = document.getElementById('avatar-circle');
                const uploadLabel = document.getElementById('upload-label');

                function handleFileSelect() {
                    fileInput.click();
                }
                avatarCircle?.addEventListener('click', handleFileSelect);
                uploadLabel?.addEventListener('click', handleFileSelect);

                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) openCrop(file);
                    fileInput.value = '';
                };

                const nameInput = document.getElementById('nameInput');
                const greetingInput = document.getElementById('greetingInput');
                const subtitlesInput = document.getElementById('subtitlesInput');
                const memoryInput = document.getElementById('memoryInput');
                const locationInput = document.getElementById('locationInput');
                const scenarioInput = document.getElementById('scenarioInput');
                const relationInput = document.getElementById('relationInput');
                const genderChips = document.querySelectorAll('.chip');
                const resetBtn = document.getElementById('resetBtn');
                const activateBtn = document.getElementById('activateBtn');

                function updateCounters() {
                    document.getElementById('greetingCounter').textContent = `${greetingInput.value.length}/100`;
                    document.getElementById('subtitlesCounter').textContent = `${subtitlesInput.value.length}/500`;
                    document.getElementById('memoryCounter').textContent = `${memoryInput.value.length}/500`;
                    document.getElementById('scenarioCounter').textContent = `${scenarioInput.value.length}/500`;
                }

                nameInput.addEventListener('input', (e) => {
                    character.name = e.target.value;
                    saveCharacterToLocal();
                });
                greetingInput.addEventListener('input', (e) => {
                    character.greeting = e.target.value;
                    saveCharacterToLocal();
                    updateCounters();
                });
                subtitlesInput.addEventListener('input', (e) => {
                    character.subtitles = e.target.value;
                    saveCharacterToLocal();
                    updateCounters();
                });
                memoryInput.addEventListener('input', (e) => {
                    character.memory_cards = e.target.value;
                    saveCharacterToLocal();
                    updateCounters();
                });
                locationInput.addEventListener('input', (e) => {
                    character.location = e.target.value;
                    saveCharacterToLocal();
                });
                scenarioInput.addEventListener('input', (e) => {
                    character.scenario = e.target.value;
                    saveCharacterToLocal();
                    updateCounters();
                });
                relationInput.addEventListener('input', (e) => {
                    character.relation = e.target.value;
                    saveCharacterToLocal();
                });

                genderChips.forEach(chip => {
                    chip.addEventListener('click', () => {
                        genderChips.forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                        character.gender = chip.dataset.gender;
                        saveCharacterToLocal();
                    });
                });

                resetBtn.addEventListener('click', () => {
                    character = {
                        name: '', gender: 'male', greeting: '', subtitles: '', memory_cards: '',
                        location: '', scenario: '', relation: '', photo: null
                    };
                    saveCharacterToLocal();
                    renderCenter();
                    tg.HapticFeedback?.impactOccurred('light');
                });

                activateBtn.addEventListener('click', () => {
                    if (!character.name.trim()) {
                        tg.showAlert('Введите имя персонажа');
                        return;
                    }
                    try {
                        const dataToSend = {
                            name: character.name,
                            gender: character.gender,
                            greeting: character.greeting,
                            subtitles: character.subtitles,
                            memory_cards: character.memory_cards,
                            location: character.location,
                            scenario: character.scenario,
                            relation: character.relation,
                            photo: character.photo || null
                        };
                        // Отправляем в бота
                        tg.sendData(JSON.stringify(dataToSend));
                        tg.showAlert(`Персонаж "${character.name}" создан!`);

                        // Сохраняем аватар для чата
                        const avatar = character.photo || "https://i.pravatar.cc/150?img=0";
                        ensureChatAvatar(character.name, avatar);

                        // Сразу открываем чат с созданным персонажем
                        renderChat(character.name, avatar);
                    } catch (err) {
                        console.error(err);
                        tg.showAlert('Ошибка при создании персонажа: ' + err.message);
                    }
                });
            }

            // ---------- Профиль с кнопкой очистки ----------
            function renderProfile() {
                const html = `
                    <div style="text-align: center; padding: 40px 20px;">
                        <i data-lucide="menu" style="width:48px;height:48px;margin-bottom:20px;"></i>
                        <p style="margin-bottom: 30px;">НАСТРОЙКИ</p>
                        <button id="clearDataBtn" style="background: #ff4d4d; border: none; color: white; padding: 12px 24px; border-radius: 40px; font-weight: bold; font-size: 16px; cursor: pointer; width: 80%;">🗑️ Очистить все данные</button>
                        <p style="font-size: 12px; color: #aaa; margin-top: 20px;">Удалятся все персонажи, чаты и фото.</p>
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();
                const clearBtn = document.getElementById('clearDataBtn');
                clearBtn.addEventListener('click', () => {
                    const keysToKeep = ['tgWebAppData', 'tgWebAppPlatform', 'tgWebAppThemeParams', 'tgWebAppVersion'];
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const key = localStorage.key(i);
                        if (key && !keysToKeep.includes(key)) {
                            localStorage.removeItem(key);
                        }
                    }
                    character = {
                        name: '', gender: 'male', greeting: '', subtitles: '', memory_cards: '',
                        location: '', scenario: '', relation: '', photo: null
                    };
                    saveCharacterToLocal();
                    tg.showAlert('Все данные очищены!');
                    renderFeed();
                    document.querySelectorAll('.bar-item').forEach(i => i.classList.remove('active'));
                    document.querySelector('.bar-item[data-tab="feed"]').classList.add('active');
                });
            }

            function renderGames() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="layout-grid" style="width:48px;height:48px;margin-bottom:20px;"></i><br>МИНИ-ИГРЫ<br>скоро здесь появятся активности</div>';
                lucide.createIcons();
            }

            // ---------- Переключение вкладок ----------
            const contentArea = document.getElementById('content-area');
            const barItems = document.querySelectorAll('.bar-item');

            barItems.forEach(item => {
                item.addEventListener('click', () => {
                    barItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const tab = item.dataset.tab;
                    if (tab === 'feed') renderFeed();
                    else if (tab === 'chats') renderChats();
                    else if (tab === 'center') renderCenter();
                    else if (tab === 'games') renderGames();
                    else if (tab === 'profile') renderProfile();
                    tg.HapticFeedback?.impactOccurred('light');
                });
            });

            // Сплэш анимация
            const splash = document.getElementById('splash-screen');
            const progressFill = document.getElementById('progress-fill');
            setTimeout(() => progressFill.style.width = '100%', 100);
            setTimeout(() => {
                splash.classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                tg.HapticFeedback?.impactOccurred('medium');
            }, 3200);

            renderFeed();
            barItems[0].classList.add('active');

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
            }
        })();
    </script>
</body>
</html>
