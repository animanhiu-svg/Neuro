<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Тест фото</title>
    <style>
        body {
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid white;
            background: #333;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        input {
            display: none;
        }
        .status {
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <input type="file" id="fileInput" accept="image/*">
    <div class="circle" id="circle"></div>
    <div class="status">Нажми на круг, выбери фото</div>

    <script>
        const circle = document.getElementById('circle');
        const fileInput = document.getElementById('fileInput');

        // Загружаем сохранённое фото
        const saved = localStorage.getItem('testPhoto');
        if (saved) {
            circle.style.backgroundImage = `url('${saved}')`;
        }

        // Клик по кругу открывает выбор файла
        circle.addEventListener('click', () => fileInput.click());

        // Обработка выбора файла
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const dataUrl = event.target.result;
                // Сохраняем
                localStorage.setItem('testPhoto', dataUrl);
                // Показываем
                circle.style.backgroundImage = `url('${dataUrl}')`;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
