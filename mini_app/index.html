<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroBro · чат</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
        .user { text-align: right; color: #aaa; }
        .bot { text-align: left; color: #fff; }
        input { width: 80%; padding: 8px; background: #1e1e1e; border: 1px solid #333; color: #fff; }
        button { padding: 8px 16px; background: #fff; color: #000; border: none; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <input id="msg" placeholder="Напиши...">
    <button onclick="send()">Отправить</button>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = Telegram.WebApp;
        tg.ready();
        const chatId = tg.initDataUnsafe.user?.id || 0;
        console.log('chatId:', chatId);
        const chatDiv = document.getElementById('chat');

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = sender;
            div.innerText = `${sender === 'user' ? 'Вы' : 'Бот'}: ${text}`;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        async function send() {
            const msg = document.getElementById('msg').value;
            if (!msg) return;
            addMessage(msg, 'user');
            document.getElementById('msg').value = '';
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, message: msg })
                });
                const data = await res.json();
                addMessage(data.reply, 'bot');
            } catch(e) {
                addMessage('Ошибка: ' + e.message, 'bot');
            }
        }
    </script>
</body>
</html>
