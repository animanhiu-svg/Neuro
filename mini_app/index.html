<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroBro · конструктор</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Hammer.js для жестов -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== СПЛЭШ ===== */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease-out;
            pointer-events: all;
        }
        #splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .splash-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1e1e1e;
            border: 2px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .splash-avatar span {
            font-size: 48px;
            color: #fff;
        }
        .splash-name {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #fff;
            margin-bottom: 16px;
        }
        .splash-quote {
            font-size: 12px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #aaa;
            margin-bottom: 30px;
        }
        .progress-container {
            width: 200px;
            height: 2px;
            background: #333;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            transition: width 3s linear;
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        #main-content {
            opacity: 0;
            transition: opacity 0.5s ease-in;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #main-content.visible {
            opacity: 1;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
        }

        /* ===== НИЖНЯЯ ПАНЕЛЬ ===== */
        .bottom-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #000000;
            padding: 8px 0 12px;
            position: relative;
            border-top: none;
        }

        .bottom-bar::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.8), transparent);
            pointer-events: none;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            font-size: 10px;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.1s ease;
            cursor: pointer;
            flex: 1;
            opacity: 0.7;
        }
        .bar-item.active {
            opacity: 1;
        }
        .bar-item.active i {
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.6));
        }
        .bar-item:active {
            transform: scale(0.92);
        }
        .bar-item:active i {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
        }
        .bar-item i {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            stroke-width: 1.5;
            transition: filter 0.1s ease;
        }

        /* ===== BOTTOM SHEET ===== */
        .sheet-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(3px);
            z-index: 1100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            display: flex;
            align-items: flex-end;
        }
        .sheet-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .sheet {
            background: #121212;
            border-top: 1px solid #fff;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 30px;
            width: 100%;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .sheet-overlay.show .sheet {
            transform: translateY(0);
        }
        .sheet-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid #333;
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .sheet-item:active {
            transform: scale(0.95);
        }
        .sheet-item:last-child {
            border-bottom: none;
        }
        .sheet-item i {
            width: 24px;
            height: 24px;
            stroke-width: 1.5;
        }

        .placeholder-page {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 16px;
            line-height: 1.8;
        }

        /* ===== КОНСТРУКТОР ===== */
        .neuro-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .neuro-header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .avatar-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }
        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #1e1e1e;
            border: 2px solid #fff;
            overflow: hidden;
            cursor: pointer;
            margin-bottom: 12px;
            position: relative;
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #fff;
        }
        .avatar-label {
            font-size: 14px;
            font-weight: 400;
            color: #aaa;
            text-decoration: underline;
            text-underline-offset: 4px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .avatar-label:active {
            transform: scale(0.95);
        }

        /* Оверлей кадрирования */
        .crop-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .crop-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .crop-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #fff;
            margin-bottom: 30px;
            position: relative;
        }
        .crop-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.1s ease;
        }
        .crop-controls {
            display: flex;
            gap: 20px;
        }
        .crop-btn {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .crop-btn:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.1);
        }
        .crop-btn.primary {
            background: #fff;
            color: #000;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 12px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 6px;
        }
        .input-field {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            padding: 8px 0;
            font-size: 16px;
            color: #fff;
            outline: none;
        }
        .input-field:focus {
            border-bottom-color: #fff;
        }
        .gender-chips {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }
        .chip {
            background: transparent;
            border: 1px solid #444;
            border-radius: 30px;
            padding: 8px 24px;
            font-size: 15px;
            font-weight: 500;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s, transform 0.1s ease;
            text-align: center;
            flex: 0 1 auto;
        }
        .chip.active {
            border-color: #fff;
            color: #fff;
        }
        .chip:active {
            transform: scale(0.95);
        }
        .char-counter {
            text-align: right;
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }
        .main-buttons {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }
        .btn {
            flex: 1;
            padding: 16px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: transform 0.1s ease, background 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
        }
        .btn-primary {
            background: #fff;
            color: #121212;
        }
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .loader-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .loader-content {
            background: #1e1e1e;
            border: 1px solid #fff;
            border-radius: 40px;
            padding: 30px 40px;
            text-align: center;
        }
        .loader-text {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }
        .loader-sub {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <input type="file" id="file-input" accept="image/*">

    <!-- СПЛЭШ -->
    <div id="splash-screen">
        <div class="splash-avatar" id="splash-avatar">
            <span id="splash-placeholder">🧬</span>
            <img id="splash-image" src="#" alt="" style="display: none;">
        </div>
        <div class="splash-name">NEURO BRO</div>
        <div class="splash-quote">ТИШИНА В ЧЕРНО-БЕЛОМ</div>
        <div class="progress-container">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="main-content">
        <div class="content-area" id="content-area"></div>

        <!-- НИЖНЯЯ ПАНЕЛЬ -->
        <div class="bottom-bar">
            <div class="bar-item" data-tab="feed"><i data-lucide="globe"></i><span>Портал</span></div>
            <div class="bar-item" data-tab="chats"><i data-lucide="message-circle-more"></i><span>Чаты</span></div>
            <div class="bar-item" data-tab="center" id="center-button"><i data-lucide="circle-user"></i><span>Центр</span></div>
            <div class="bar-item" data-tab="games"><i data-lucide="layout-grid"></i><span>Игры</span></div>
            <div class="bar-item" data-tab="settings"><i data-lucide="menu"></i><span>Меню</span></div>
        </div>
    </div>

    <!-- BOTTOM SHEET -->
    <div class="sheet-overlay" id="sheet-overlay">
        <div class="sheet">
            <div class="sheet-item" id="create-character"><i data-lucide="user-plus"></i> Создать персонажа</div>
            <div class="sheet-item" id="create-group"><i data-lucide="users"></i> Новая группа</div>
        </div>
    </div>

    <!-- ОВЕРЛЕЙ КАДРИРОВАНИЯ -->
    <div class="crop-overlay" id="crop-overlay">
        <div class="crop-container" id="crop-container">
            <div class="crop-image" id="crop-image"></div>
        </div>
        <div class="crop-controls">
            <button class="crop-btn" id="crop-cancel">Отмена</button>
            <button class="crop-btn primary" id="crop-apply">Применить</button>
        </div>
    </div>

    <!-- Лоадер -->
    <div class="loader-overlay" id="loader">
        <div class="loader-content">
            <div class="loader-text">ПРОБУЖДЕНИЕ</div>
            <div class="loader-sub">связь с нейросетью...</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            lucide.createIcons();

            // Элементы
            const splash = document.getElementById('splash-screen');
            const progressFill = document.getElementById('progress-fill');
            const mainContent = document.getElementById('main-content');
            const contentArea = document.getElementById('content-area');
            const fileInput = document.getElementById('file-input');
            const loader = document.getElementById('loader');
            const splashPlaceholder = document.getElementById('splash-placeholder');
            const splashImage = document.getElementById('splash-image');
            const sheetOverlay = document.getElementById('sheet-overlay');
            const createCharacterBtn = document.getElementById('create-character');
            const createGroupBtn = document.getElementById('create-group');
            const centerButton = document.getElementById('center-button');

            const cropOverlay = document.getElementById('crop-overlay');
            const cropContainer = document.getElementById('crop-container');
            const cropImageDiv = document.getElementById('crop-image');
            const cropCancel = document.getElementById('crop-cancel');
            const cropApply = document.getElementById('crop-apply');

            // Данные персонажа
            let character = {
                name: '',
                gender: 'male',
                greeting: '',
                story: '',
                photo: localStorage.getItem('characterPhoto') || null
            };
            const saved = localStorage.getItem('neuroCharacter');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    character = { ...character, ...parsed };
                } catch (e) {}
            }

            // Переменные для кадрирования
            let currentImageSrc = null;
            let originalImage = null; // для canvas
            let scale = 1;
            let posX = 0, posY = 0;
            let lastScale = 1, lastPosX = 0, lastPosY = 0;
            let hammer = null;

            function saveCharacter() {
                localStorage.setItem('neuroCharacter', JSON.stringify(character));
            }

            // Обновление фото (только dataURL, без трансформаций)
            function updatePhoto(dataUrl) {
                character.photo = dataUrl;
                localStorage.setItem('characterPhoto', dataUrl);
                // обновляем сплэш
                splashPlaceholder.style.display = 'none';
                splashImage.src = dataUrl;
                splashImage.style.display = 'block';
                saveCharacter();
                // перерисовываем главную, если активна
                if (getCurrentTab() === 'center' || document.querySelector('.bar-item.active')?.dataset.tab === 'center') {
                    renderHome();
                }
            }

            // Загрузка файла
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentImageSrc = event.target.result;
                    // загружаем изображение в объект для canvas
                    const img = new Image();
                    img.onload = () => {
                        originalImage = img;
                        openCrop();
                    };
                    img.src = currentImageSrc;
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
            });

            // Открыть режим кадрирования
            function openCrop() {
                cropImageDiv.style.backgroundImage = `url('${currentImageSrc}')`;
                scale = 1;
                posX = 0;
                posY = 0;
                lastScale = 1;
                lastPosX = 0;
                lastPosY = 0;
                updateCropTransform();
                cropOverlay.classList.add('show');

                if (hammer) hammer.destroy();
                hammer = new Hammer(cropContainer);
                hammer.get('pinch').set({ enable: true });
                hammer.on('pinch', (ev) => {
                    scale = Math.max(0.5, Math.min(3, lastScale * ev.scale));
                    updateCropTransform();
                });
                hammer.on('pinchend', () => {
                    lastScale = scale;
                });
                hammer.on('pan', (ev) => {
                    posX = lastPosX + ev.deltaX;
                    posY = lastPosY + ev.deltaY;
                    updateCropTransform();
                });
                hammer.on('panend', () => {
                    lastPosX = posX;
                    lastPosY = posY;
                });
            }

            function updateCropTransform() {
                cropImageDiv.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
            }

            // Обрезка изображения через canvas
            function cropImageAndSave() {
                if (!originalImage) return;

                // Создаём canvas размером с круг (280x280)
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 280;
                canvas.height = 280;

                // Вычисляем параметры отображения: фон занимает весь контейнер с cover
                // Но мы используем transform, поэтому нам нужно нарисовать часть изображения.
                // Проще: берём текущие scale и translate, применяем к рисованию.
                // Для этого сначала определим, как изображение масштабируется, чтобы вписаться в 280px.
                // Исходные размеры изображения: originalImage.width, originalImage.height.
                // Коэффициент масштабирования, чтобы изображение заполнило контейнер по cover:
                const containerSize = 280;
                const imgW = originalImage.width;
                const imgH = originalImage.height;
                const coverScale = Math.max(containerSize / imgW, containerSize / imgH);
                const drawWidth = imgW * coverScale * scale;
                const drawHeight = imgH * coverScale * scale;
                // Смещение в пикселях холста: мы хотим, чтобы область, видимая в круге, соответствовала transform.
                // Позиция на холсте: центр изображения сдвигается на posX, posY в пикселях экрана, но нам нужно пересчитать в координаты изображения.
                // Проще всего нарисовать изображение с текущим трансформом, а затем обрезать по кругу.
                // Для этого рисуем изображение с учётом scale и translate.
                // Но translate задан в пикселях экрана, а не в пикселях исходного изображения.
                // Поскольку мы используем background-size: cover, изначально изображение центрировано и масштабировано.
                // Мы можем вычислить смещение в процентах от исходного изображения.

                // Альтернатива: временно применить transform к canvas через context.translate/scale.
                // Но тогда нужно правильно рассчитать центр.
                // Для простоты я сделаю так: рисую изображение в масштабе, а затем вырезаю круг.
                // Но чтобы учесть translate, нужно сместить начало координат.

                // Поскольку мы используем background-image с cover, начальное состояние: изображение центрировано и масштабировано так, чтобы полностью покрыть круг.
                // Это значит, что если scale=1 и posX=posY=0, мы видим центральную часть изображения.
                // Чтобы нарисовать то же самое на canvas, нужно вычислить отступ.
                // Координаты левого верхнего угла видимой области в исходном изображении:
                // Для cover: отображаемая часть изображения имеет размеры containerSize / coverScale в пикселях исходного изображения.
                // Центр изображения совпадает с центром холста.
                // При transform: мы смещаем фон на posX, posY в пикселях холста. Это соответствует смещению исходного изображения на -posX / coverScale, -posY / coverScale.
                // И масштабирование scale дополнительно увеличивает изображение.

                // Реализация:
                const srcX = (imgW / 2) - (containerSize / (2 * coverScale)) - (posX / coverScale);
                const srcY = (imgH / 2) - (containerSize / (2 * coverScale)) - (posY / coverScale);
                const srcWidth = containerSize / (coverScale * scale);
                const srcHeight = containerSize / (coverScale * scale);

                // Рисуем изображение на canvas с обрезкой
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(
                    originalImage,
                    srcX, srcY, srcWidth, srcHeight,
                    0, 0, canvas.width, canvas.height
                );

                // Теперь обрезаем по кругу (создаём альфа-маску)
                // Можно нарисовать круг и вырезать
                ctx.globalCompositeOperation = 'destination-in';
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, canvas.width/2, 0, 2*Math.PI);
                ctx.fillStyle = '#fff';
                ctx.fill();

                // Получаем dataURL
                const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                updatePhoto(croppedDataUrl);
            }

            cropCancel.addEventListener('click', () => {
                cropOverlay.classList.remove('show');
                if (hammer) hammer.destroy();
            });

            cropApply.addEventListener('click', () => {
                cropImageAndSave();
                cropOverlay.classList.remove('show');
                if (hammer) hammer.destroy();
            });

            // Рендер главной страницы (конструктор)
            function renderHome() {
                let photoHtml = character.photo
                    ? `<img src="${character.photo}" class="avatar-image" alt="">`
                    : '<span class="avatar-placeholder">🧬</span>';

                const html = `
                    <div class="neuro-header"><h1>NEURO BRO</h1></div>
                    <div class="avatar-block">
                        <div class="avatar-circle" id="avatar-circle">${photoHtml}</div>
                        <div class="avatar-label" id="upload-label">[ ОБРАЗ ]</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ИМЯ ]</div>
                        <input type="text" class="input-field" id="nameInput" value="${character.name || ''}" maxlength="30">
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ПОЛ ]</div>
                        <div class="gender-chips" id="genderChips">
                            <div class="chip ${character.gender === 'male' ? 'active' : ''}" data-gender="male">М</div>
                            <div class="chip ${character.gender === 'female' ? 'active' : ''}" data-gender="female">Ж</div>
                            <div class="chip ${character.gender === 'other' ? 'active' : ''}" data-gender="other">⚥</div>
                        </div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ГОЛОС ]</div>
                        <input type="text" class="input-field" id="greetingInput" value="${character.greeting || ''}" maxlength="100">
                        <div class="char-counter" id="greetingCounter">${character.greeting?.length || 0}/100</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ИСТОРИЯ ]</div>
                        <input type="text" class="input-field" id="storyInput" value="${character.story || ''}" maxlength="200">
                        <div class="char-counter" id="storyCounter">${character.story?.length || 0}/200</div>
                    </div>
                    <div class="main-buttons">
                        <button class="btn btn-outline" id="resetBtn">СБРОС</button>
                        <button class="btn btn-primary" id="activateBtn">ПРОБУДИТЬ</button>
                    </div>
                `;
                contentArea.innerHTML = html;

                // Привязка событий
                document.getElementById('avatar-circle')?.addEventListener('click', () => fileInput.click());
                document.getElementById('upload-label')?.addEventListener('click', () => fileInput.click());

                const nameInput = document.getElementById('nameInput');
                const greetingInput = document.getElementById('greetingInput');
                const storyInput = document.getElementById('storyInput');
                const genderChips = document.querySelectorAll('.chip');
                const resetBtn = document.getElementById('resetBtn');
                const activateBtn = document.getElementById('activateBtn');

                nameInput?.addEventListener('input', (e) => { character.name = e.target.value; saveCharacter(); });
                greetingInput?.addEventListener('input', (e) => { character.greeting = e.target.value; saveCharacter(); updateCounters(); });
                storyInput?.addEventListener('input', (e) => { character.story = e.target.value; saveCharacter(); updateCounters(); });

                function updateCounters() {
                    const gc = document.getElementById('greetingCounter');
                    const sc = document.getElementById('storyCounter');
                    if(gc) gc.textContent = `${greetingInput.value.length}/100`;
                    if(sc) sc.textContent = `${storyInput.value.length}/200`;
                }

                genderChips.forEach(chip => {
                    chip.addEventListener('click', function() {
                        genderChips.forEach(c => c.classList.remove('active'));
                        this.classList.add('active');
                        character.gender = this.dataset.gender;
                        saveCharacter();
                    });
                });

                resetBtn?.addEventListener('click', () => {
                    character = {
                        name: '', gender: 'male', greeting: '', story: '',
                        photo: character.photo // фото оставляем
                    };
                    saveCharacter();
                    renderHome();
                    tg.HapticFeedback?.impactOccurred('light');
                });

                activateBtn?.addEventListener('click', () => {
                    loader.classList.add('show');
                    tg.HapticFeedback?.impactOccurred('medium');
                    setTimeout(() => {
                        loader.classList.remove('show');
                        console.log('Персонаж:', character);
                        tg.showAlert('Данные готовы к отправке (консоль)');
                    }, 1500);
                });
            }

            // Рендер других страниц
            function renderFeed() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="globe" style="width:48px; height:48px; margin-bottom:20px;"></i><br>ЛЕНТА ПЕРСОНАЖЕЙ<br>скоро здесь будут карточки других игроков</div>';
                lucide.createIcons();
            }
            function renderChats() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="message-circle-more" style="width:48px; height:48px; margin-bottom:20px;"></i><br>ДИАЛОГИ<br>список активных чатов с персонажами</div>';
                lucide.createIcons();
            }
            function renderGames() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="layout-grid" style="width:48px; height:48px; margin-bottom:20px;"></i><br>МИНИ-ИГРЫ<br>скоро здесь появятся активности</div>';
                lucide.createIcons();
            }
            function renderSettings() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="menu" style="width:48px; height:48px; margin-bottom:20px;"></i><br>НАСТРОЙКИ<br>профиль, уведомления, тема</div>';
                lucide.createIcons();
            }

            // Обработка нижнего меню
            const barItems = document.querySelectorAll('.bar-item');
            barItems.forEach(item => {
                item.addEventListener('click', () => {
                    const tab = item.dataset.tab;
                    if (tab === 'center') {
                        sheetOverlay.classList.add('show');
                        tg.HapticFeedback?.impactOccurred('medium');
                        return;
                    }
                    sheetOverlay.classList.remove('show');
                    barItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    switch(tab) {
                        case 'feed': renderFeed(); break;
                        case 'chats': renderChats(); break;
                        case 'games': renderGames(); break;
                        case 'settings': renderSettings(); break;
                    }
                    tg.HapticFeedback?.impactOccurred('light');
                });
            });

            // Bottom Sheet
            createCharacterBtn.addEventListener('click', () => {
                sheetOverlay.classList.remove('show');
                barItems.forEach(i => i.classList.remove('active'));
                renderHome();
                tg.HapticFeedback?.impactOccurred('medium');
            });
            createGroupBtn.addEventListener('click', () => {
                sheetOverlay.classList.remove('show');
                alert('Создание группы — будет позже');
                tg.HapticFeedback?.impactOccurred('medium');
            });
            sheetOverlay.addEventListener('click', (e) => {
                if (e.target === sheetOverlay) {
                    sheetOverlay.classList.remove('show');
                }
            });

            // Сплэш анимация
            setTimeout(() => progressFill.style.width = '100%', 100);
            setTimeout(() => {
                splash.classList.add('hidden');
                mainContent.classList.add('visible');
                tg.HapticFeedback?.impactOccurred('medium');
            }, 3200);

            // Стартовая страница — лента
            renderFeed();
            document.querySelector('.bar-item[data-tab="feed"]').classList.add('active');

            // Восстановление фото в сплэше
            if (character.photo) {
                splashPlaceholder.style.display = 'none';
                splashImage.src = character.photo;
                splashImage.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
