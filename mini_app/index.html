<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroBro · просто</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121212;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid #fff;
            overflow: hidden;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .avatar .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: #333;
        }
        input {
            display: none;
        }
        .info {
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <input type="file" id="fileInput" accept="image/*">
    <div class="avatar" id="avatar">
        <!-- Сюда будет вставлено изображение -->
    </div>
    <div class="info">Нажми на круг, выбери фото</div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const avatar = document.getElementById('avatar');

        // Загружаем сохранённое фото
        const savedPhoto = localStorage.getItem('avatar');
        if (savedPhoto) {
            avatar.innerHTML = `<img src="${savedPhoto}" alt="avatar">`;
        } else {
            avatar.innerHTML = '<div class="placeholder">🧬</div>';
        }

        // Обработка выбора файла
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const dataUrl = event.target.result;
                // Сохраняем
                localStorage.setItem('avatar', dataUrl);
                // Отображаем
                avatar.innerHTML = `<img src="${dataUrl}" alt="avatar">`;
            };
            reader.readAsDataURL(file);
        });

        // Клик по аватарке открывает выбор файла
        avatar.addEventListener('click', () => fileInput.click());
    </script>
</body>
</html>
