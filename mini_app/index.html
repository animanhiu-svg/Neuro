<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroBro · ИИ-чат</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #fff;
            min-height: 100vh;
        }

        /* сплэш */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s;
        }
        #splash-screen.hidden { opacity: 0; pointer-events: none; }
        .splash-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background: #1e1e1e; border: 2px solid #fff;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px; overflow: hidden;
            background-image: url('');
            background-size: cover;
            background-position: center;
        }
        .splash-avatar span { font-size: 48px; color: #fff; }
        .splash-name { font-size: 32px; font-weight: 600; color: #fff; margin-bottom: 16px; }
        .splash-quote { font-size: 12px; color: #aaa; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        .progress-container { width: 200px; height: 2px; background: #333; }
        .progress-fill { height: 100%; width: 0%; background: #fff; transition: width 3s linear; }

        /* основной контент */
        #main-content {
            opacity: 0; transition: opacity 0.5s;
            display: flex; flex-direction: column; height: 100vh;
        }
        #main-content.visible { opacity: 1; }
        .content-area {
            flex: 1; overflow-y: auto; padding: 20px 16px;
            max-width: 420px; margin: 0 auto; width: 100%;
        }

        /* нижняя панель */
        .bottom-bar {
            display: flex; justify-content: space-around;
            background: #000; padding: 8px 0 12px;
            position: relative; border-top: none;
        }
        .bottom-bar::before {
            content: ""; position: absolute; top: 0; left: 50%;
            transform: translateX(-50%); width: 70%; height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.8), transparent);
        }
        .bar-item {
            display: flex; flex-direction: column; align-items: center;
            color: #fff; font-size: 10px; opacity: 0.7;
            transition: transform 0.1s, opacity 0.2s; cursor: pointer; flex: 1;
        }
        .bar-item.active { opacity: 1; }
        .bar-item:active { transform: scale(0.92); }
        .bar-item i { width: 24px; height: 24px; margin-bottom: 4px; stroke-width: 1.5; }

        /* bottom sheet */
        .sheet-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(3px);
            z-index: 1100; opacity: 0; pointer-events: none;
            transition: opacity 0.3s; display: flex; align-items: flex-end;
        }
        .sheet-overlay.show { opacity: 1; pointer-events: all; }
        .sheet {
            background: #121212; border-top: 1px solid #fff;
            border-radius: 24px 24px 0 0; padding: 24px 20px 30px;
            width: 100%; transform: translateY(100%); transition: transform 0.3s;
        }
        .sheet-overlay.show .sheet { transform: translateY(0); }
        .sheet-item {
            display: flex; align-items: center; gap: 16px;
            padding: 16px 0; border-bottom: 1px solid #333;
            font-size: 18px; color: #fff; cursor: pointer;
        }
        .sheet-item:active { transform: scale(0.95); }
        .sheet-item:last-child { border-bottom: none; }
        .sheet-item i { width: 24px; height: 24px; }

        /* портал (поиск) */
        .portal-header { margin-bottom: 24px; }
        .portal-header h2 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .portal-header p { font-size: 14px; color: #aaa; margin-bottom: 12px; }
        .online-stats {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: #b388ff;
            background: rgba(179, 136, 255, 0.1);
            padding: 6px 12px; border-radius: 30px; width: fit-content;
        }
        .online-stats i { width: 16px; height: 16px; }
        .search-box {
            display: flex; align-items: center;
            background: #1e1e1e; border-radius: 30px; padding: 12px 18px;
            margin-bottom: 20px; border: 1px solid #333;
        }
        .search-box:focus-within { border-color: #fff; }
        .search-box i { width: 20px; height: 20px; margin-right: 12px; color: #aaa; }
        .search-box input {
            background: transparent; border: none; outline: none;
            color: #fff; font-size: 16px; width: 100%;
        }
        .categories {
            display: flex; gap: 12px; overflow-x: auto;
            padding-bottom: 12px; margin-bottom: 20px;
        }
        .category-chip {
            background: transparent; border: 1px solid #444; border-radius: 30px;
            padding: 8px 18px; font-size: 14px; white-space: nowrap;
            cursor: pointer; transition: all 0.2s;
        }
        .category-chip.active {
            border-color: #fff; background: rgba(255,255,255,0.1); color: #fff;
        }
        .trending { margin-bottom: 20px; }
        .trending-label {
            font-size: 12px; color: #888; margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .trending-chips { display: flex; flex-wrap: wrap; gap: 10px; }
        .trending-chip {
            background: rgba(255,255,255,0.05); border-radius: 30px;
            padding: 6px 14px; font-size: 13px; cursor: pointer;
        }
        .characters-list {
            display: flex; flex-direction: column; gap: 16px;
        }
        .character-card {
            background: #1a1a1a; border-radius: 24px; padding: 12px;
            border: 1px solid #2a2a2a; transition: transform 0.2s, border-color 0.2s;
            opacity: 0; transform: translateY(15px);
            animation: fadeInUp 0.3s forwards;
        }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .card-row { display: flex; gap: 12px; }
        .card-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background-size: cover; background-position: center;
            background-color: #333; flex-shrink: 0;
        }
        .card-info { flex: 1; }
        .card-name {
            font-size: 18px; font-weight: 600;
            display: flex; justify-content: space-between;
            align-items: center;
        }
        .card-rating {
            display: flex; align-items: center; gap: 4px;
            font-size: 12px; color: #ffd966;
        }
        .card-rating i { width: 14px; height: 14px; fill: currentColor; }
        .card-desc { font-size: 12px; color: #aaa; margin: 4px 0 6px; }
        .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag {
            background: #2a2a2a; border-radius: 20px;
            padding: 2px 10px; font-size: 10px; color: #ccc;
        }
        .card-actions {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 8px;
        }
        .btn-chat {
            background: transparent; border: 1px solid #fff; border-radius: 30px;
            padding: 6px 16px; font-size: 12px; color: #fff;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-chat:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .btn-like {
            background: transparent; border: none; color: #888;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
            font-size: 12px;
        }
        .btn-like i { width: 18px; height: 18px; }
        .btn-like.active { color: #ff5e5e; }
        .empty-state { text-align: center; padding: 40px 20px; color: #aaa; }

        /* чат */
        .chat-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #333;
        }
        .chat-back {
            background: transparent; border: none; color: #fff;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            font-size: 14px; padding: 6px 12px; border-radius: 30px;
            transition: background 0.2s;
        }
        .chat-back:active { background: rgba(255,255,255,0.1); }
        .chat-avatar { width: 40px; height: 40px; border-radius: 50%; background-size: cover; background-position: center; }
        .chat-name { font-size: 18px; font-weight: 600; }
        .messages {
            flex: 1; display: flex; flex-direction: column; gap: 12px;
            margin-bottom: 20px; overflow-y: auto; max-height: 60vh;
        }
        .message { display: flex; flex-direction: column; max-width: 80%; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.bot { align-self: flex-start; align-items: flex-start; }
        .message-bubble {
            background: #2a2a2a; padding: 8px 12px; border-radius: 18px;
            font-size: 14px; word-break: break-word;
        }
        .message.user .message-bubble { background: #2481cc; color: #fff; }
        .message-time { font-size: 10px; color: #888; margin-top: 4px; margin-left: 8px; margin-right: 8px; }
        .chat-input-container {
            display: flex; gap: 10px; margin-top: auto;
            background: #1e1e1e; border-radius: 30px; padding: 8px 12px;
            border: 1px solid #333;
        }
        .chat-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 14px; }
        .chat-send { background: transparent; border: none; color: #fff; cursor: pointer; padding: 6px; display: flex; align-items: center; }
        .chat-send:active { transform: scale(0.95); }

        /* список чатов */
        .chats-list { display: flex; flex-direction: column; gap: 12px; }
        .chat-item {
            display: flex; align-items: center; gap: 12px;
            background: #1a1a1a; border-radius: 20px; padding: 12px;
            border: 1px solid #2a2a2a; cursor: pointer;
        }
        .chat-item:active { transform: scale(0.98); }
        .chat-item-avatar {
            width: 50px; height: 50px; border-radius: 50%;
            background-size: cover; background-position: center; flex-shrink: 0;
        }
        .chat-item-info { flex: 1; min-width: 0; }
        .chat-item-name {
            font-size: 16px; font-weight: 600; margin-bottom: 4px;
            display: flex; justify-content: space-between;
        }
        .chat-item-last {
            font-size: 12px; color: #aaa;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .chat-item-badge {
            background: #2481cc; border-radius: 30px;
            padding: 2px 8px; font-size: 10px; font-weight: 600; color: #fff;
            margin-left: 8px;
        }
        .empty-chats { text-align: center; padding: 40px 20px; color: #aaa; }

        /* конструктор */
        .neuro-header { text-align: center; margin-bottom: 24px; }
        .neuro-header h1 { font-size: 28px; font-weight: 600; color: #fff; }
        .avatar-block { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
        .avatar-circle {
            width: 120px; height: 120px; border-radius: 50%;
            background: #1e1e1e; border: 2px solid #fff;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .avatar-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; color: #fff;
            background: #1e1e1e;
            border-radius: 50%;
        }
        .avatar-label {
            font-size: 14px; color: #aaa; text-decoration: underline;
            text-underline-offset: 4px; cursor: pointer;
        }
        .avatar-label:active { transform: scale(0.95); }
        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 6px; }
        .input-field {
            width: 100%; background: transparent; border: none;
            border-bottom: 1px solid #444; padding: 8px 0;
            font-size: 16px; color: #fff; outline: none;
        }
        .input-field:focus { border-bottom-color: #fff; }
        .gender-chips { display: flex; gap: 16px; margin-top: 8px; }
        .chip {
            background: transparent; border: 1px solid #444; border-radius: 30px;
            padding: 8px 24px; font-size: 15px; color: #aaa;
            cursor: pointer; transition: all 0.2s;
        }
        .chip.active { border-color: #fff; color: #fff; }
        .chip:active { transform: scale(0.95); }
        .char-counter { text-align: right; font-size: 10px; color: #666; margin-top: 4px; }
        .main-buttons { display: flex; gap: 16px; margin-top: 32px; }
        .btn {
            flex: 1; padding: 16px 0; border-radius: 40px;
            font-weight: 600; font-size: 15px; text-transform: uppercase;
            border: none; cursor: pointer; transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-outline { background: transparent; border: 1px solid #fff; color: #fff; }
        .btn-primary { background: #fff; color: #121212; }
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center;
            z-index: 1200; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .loader-overlay.show { opacity: 1; pointer-events: all; }
        .loader-content { background: #1e1e1e; border: 1px solid #fff; border-radius: 40px; padding: 30px 40px; text-align: center; }
        .loader-text { font-size: 18px; font-weight: 500; color: #fff; }
        .loader-sub { margin-top: 10px; font-size: 12px; color: #aaa; }
        #file-input { display: none; }
        .crop-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .crop-modal.show { display: flex; }
        .crop-container {
            width: 300px; height: 300px; border-radius: 50%;
            overflow: hidden; border: 2px solid #fff; margin-bottom: 30px;
        }
        .crop-image { max-width: 100%; max-height: 100%; }
        .crop-controls { display: flex; gap: 20px; }
        .crop-btn {
            background: transparent; border: 1px solid #fff; color: #fff;
            padding: 12px 30px; border-radius: 40px; font-size: 16px; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
        }
        .crop-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .crop-btn.primary { background: #fff; color: #000; }
    </style>
</head>
<body>
    <input type="file" id="file-input" accept="image/*">

    <!-- СПЛЭШ -->
    <div id="splash-screen">
        <div class="splash-avatar" id="splash-avatar">
            <span id="splash-placeholder">🧬</span>
        </div>
        <div class="splash-name">NEURO BRO</div>
        <div class="splash-quote">ТИШИНА В ЧЕРНО-БЕЛОМ</div>
        <div class="progress-container"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="main-content">
        <div class="content-area" id="content-area"></div>
        <div class="bottom-bar">
            <div class="bar-item" data-tab="feed"><i data-lucide="globe"></i><span>Портал</span></div>
            <div class="bar-item" data-tab="chats"><i data-lucide="message-circle-more"></i><span>Чаты</span></div>
            <div class="bar-item" data-tab="center" id="center-button"><i data-lucide="circle-user"></i><span>Центр</span></div>
            <div class="bar-item" data-tab="games"><i data-lucide="layout-grid"></i><span>Игры</span></div>
            <div class="bar-item" data-tab="settings"><i data-lucide="menu"></i><span>Меню</span></div>
        </div>
    </div>

    <!-- BOTTOM SHEET -->
    <div class="sheet-overlay" id="sheet-overlay">
        <div class="sheet">
            <div class="sheet-item" id="create-character"><i data-lucide="user-plus"></i> Создать персонажа</div>
            <div class="sheet-item" id="create-group"><i data-lucide="users"></i> Новая группа</div>
        </div>
    </div>

    <!-- МОДАЛКА КАДРИРОВАНИЯ -->
    <div class="crop-modal" id="crop-modal">
        <div class="crop-container">
            <img src="" id="crop-image" class="crop-image">
        </div>
        <div class="crop-controls">
            <button class="crop-btn" id="crop-cancel">Отмена</button>
            <button class="crop-btn primary" id="crop-apply">Готово</button>
        </div>
    </div>

    <!-- ЛОАДЕР -->
    <div class="loader-overlay" id="loader">
        <div class="loader-content"><div class="loader-text">ПРОБУЖДЕНИЕ</div><div class="loader-sub">связь с нейросетью...</div></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();

            const chatId = tg.initDataUnsafe.user?.id || 0;

            // Элементы
            const splash = document.getElementById('splash-screen');
            const progressFill = document.getElementById('progress-fill');
            const mainContent = document.getElementById('main-content');
            const contentArea = document.getElementById('content-area');
            const fileInput = document.getElementById('file-input');
            const loader = document.getElementById('loader');
            const splashPlaceholder = document.getElementById('splash-placeholder');
            const sheetOverlay = document.getElementById('sheet-overlay');
            const createCharacterBtn = document.getElementById('create-character');
            const createGroupBtn = document.getElementById('create-group');
            const barItems = document.querySelectorAll('.bar-item');

            // Кадрирование
            const cropModal = document.getElementById('crop-modal');
            const cropImage = document.getElementById('crop-image');
            const cropCancel = document.getElementById('crop-cancel');
            const cropApply = document.getElementById('crop-apply');
            let cropper = null;

            // Данные персонажа
            let character = {
                name: '',
                gender: 'male',
                greeting: '',
                story: ''
            };
            try {
                const saved = localStorage.getItem('neuroCharacter');
                if (saved) Object.assign(character, JSON.parse(saved));
            } catch (e) {}
            let photo = localStorage.getItem('characterPhoto') || null;

            function saveCharacter() {
                localStorage.setItem('neuroCharacter', JSON.stringify(character));
            }

            function setPhoto(dataUrl) {
                photo = dataUrl;
                if (dataUrl) localStorage.setItem('characterPhoto', dataUrl);
                else localStorage.removeItem('characterPhoto');
                const avatarCircle = document.querySelector('.avatar-circle');
                if (avatarCircle) {
                    if (dataUrl) {
                        avatarCircle.style.backgroundImage = `url('${dataUrl}')`;
                        const placeholder = avatarCircle.querySelector('.avatar-placeholder');
                        if (placeholder) placeholder.remove();
                    } else {
                        avatarCircle.style.backgroundImage = 'none';
                        if (!avatarCircle.querySelector('.avatar-placeholder')) {
                            avatarCircle.innerHTML = '<div class="avatar-placeholder">🧬</div>';
                        }
                    }
                }
            }

            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const dataUrl = event.target.result;
                    cropImage.src = dataUrl;
                    cropModal.classList.add('show');
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(cropImage, {
                        aspectRatio: 1,
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 1,
                        cropBoxMovable: false,
                        cropBoxResizable: false,
                        toggleDragModeOnDblclick: false,
                        background: false,
                        modal: false,
                        guides: false,
                        center: false,
                        highlight: false
                    });
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
            });

            cropCancel.addEventListener('click', () => {
                cropModal.classList.remove('show');
                if (cropper) cropper.destroy();
            });
            cropApply.addEventListener('click', () => {
                if (!cropper) return;
                const canvas = cropper.getCroppedCanvas({ width: 300, height: 300, imageSmoothingQuality: 'high' });
                const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                setPhoto(croppedDataUrl);
                cropModal.classList.remove('show');
                cropper.destroy();
                tg.HapticFeedback?.impactOccurred('medium');
            });

            // Управление списком чатов
            let currentChat = null;
            function getChatsList() {
                try { return JSON.parse(localStorage.getItem('chatsList')) || []; } catch(e) { return []; }
            }
            function saveChatsList(chats) {
                localStorage.setItem('chatsList', JSON.stringify(chats));
            }
            function updateChatsList(chatId, name, avatar, lastMessage, lastTime, incrementUnread = false) {
                let chats = getChatsList();
                const idx = chats.findIndex(c => c.chatId === chatId);
                const now = new Date();
                const timeStr = lastTime || now.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
                const newChat = { chatId, name, avatar, lastMessage, lastTime: timeStr, unreadCount: 0 };
                if (idx !== -1) {
                    chats[idx].lastMessage = lastMessage;
                    chats[idx].lastTime = timeStr;
                    if (incrementUnread && currentChat !== chatId) chats[idx].unreadCount = (chats[idx].unreadCount || 0) + 1;
                    else chats[idx].unreadCount = 0;
                } else {
                    newChat.unreadCount = (incrementUnread && currentChat !== chatId) ? 1 : 0;
                    chats.push(newChat);
                }
                chats.sort((a,b) => new Date(b.lastTime) - new Date(a.lastTime));
                saveChatsList(chats);
            }

            // Рендер чата (с рабочим fetch)
            function renderChat(chatName, chatAvatar) {
                const storageKey = `chat_${chatName}`;
                let messages = [];
                try { messages = JSON.parse(localStorage.getItem(storageKey)) || []; } catch(e) {}
                currentChat = chatName;

                const html = `
                    <div class="chat-header">
                        <button class="chat-back" id="chat-back"><i data-lucide="arrow-left"></i> Назад</button>
                        <div class="chat-avatar" style="background-image: url('${chatAvatar}');"></div>
                        <div class="chat-name">${escapeHtml(chatName)}</div>
                    </div>
                    <div class="messages" id="chat-messages">
                        ${messages.map(msg => `
                            <div class="message ${msg.sender}">
                                <div class="message-bubble">${escapeHtml(msg.text)}</div>
                                <div class="message-time">${msg.time}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="chat-input-container">
                        <input type="text" class="chat-input" id="chat-input" placeholder="Написать...">
                        <button class="chat-send" id="chat-send"><i data-lucide="send"></i></button>
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();

                const messagesContainer = document.getElementById('chat-messages');
                const input = document.getElementById('chat-input');
                const sendBtn = document.getElementById('chat-send');
                const backBtn = document.getElementById('chat-back');

                function scrollToBottom() {
                    if (messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }
                scrollToBottom();

                function addMessage(text, sender) {
                    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
                    messages.push({ text, sender, time });
                    localStorage.setItem(storageKey, JSON.stringify(messages));
                    if (sender === 'user') updateChatsList(chatName, chatName, chatAvatar, text, time, true);
                    else updateChatsList(chatName, chatName, chatAvatar, text, time, false);

                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${sender}`;
                    msgDiv.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
                    messagesContainer.appendChild(msgDiv);
                    scrollToBottom();
                }

                async function sendMessage() {
                    const text = input.value.trim();
                    if (!text) return;
                    addMessage(text, 'user');
                    input.value = '';

                    try {
                        const response = await fetch('/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chat_id: chatId, message: text })
                        });
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const data = await response.json();
                        if (data.reply) {
                            addMessage(data.reply, 'bot');
                        } else {
                            addMessage('⚠️ Пустой ответ от сервера', 'bot');
                        }
                    } catch (err) {
                        console.error(err);
                        addMessage('⚠️ Ошибка соединения с сервером', 'bot');
                    }
                }

                sendBtn.addEventListener('click', sendMessage);
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') sendMessage();
                });
                backBtn.addEventListener('click', () => {
                    currentChat = null;
                    renderChats();
                });
            }

            // Список чатов
            function renderChats() {
                const chats = getChatsList();
                if (chats.length === 0) {
                    contentArea.innerHTML = `
                        <div class="empty-chats">
                            <i data-lucide="message-circle" style="width:48px;height:48px;margin-bottom:16px;"></i>
                            <p>Нет чатов</p>
                            <p style="font-size:12px">Начните диалог из портала</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }
                const html = `
                    <div class="chats-list">
                        ${chats.map(chat => `
                            <div class="chat-item" data-chat-id="${escapeHtml(chat.chatId)}">
                                <div class="chat-item-avatar" style="background-image: url('${chat.avatar}');"></div>
                                <div class="chat-item-info">
                                    <div class="chat-item-name">
                                        ${escapeHtml(chat.name)}
                                        ${chat.unreadCount > 0 ? `<span class="chat-item-badge">${chat.unreadCount}</span>` : ''}
                                    </div>
                                    <div class="chat-item-last">${escapeHtml(chat.lastMessage)}</div>
                                    <div style="font-size:10px; color:#666;">${chat.lastTime}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();
                document.querySelectorAll('.chat-item').forEach(el => {
                    const chatId = el.dataset.chatId;
                    const chat = chats.find(c => c.chatId === chatId);
                    if (chat) {
                        el.addEventListener('click', () => {
                            let updated = getChatsList();
                            const idx = updated.findIndex(c => c.chatId === chatId);
                            if (idx !== -1) updated[idx].unreadCount = 0;
                            saveChatsList(updated);
                            renderChat(chat.name, chat.avatar);
                        });
                    }
                });
            }

            // Портал
            function renderFeed() {
                const demoCharacters = [
                    { name: "Айко", desc: "Кибер-воин, ищущая напарника", tags: ["боевик", "киберпанк"], rating: 4.8, avatar: "https://i.pravatar.cc/150?img=1" },
                    { name: "Нейро", desc: "Загадочный хакер, любит головоломки", tags: ["хакер", "детектив"], rating: 4.9, avatar: "https://i.pravatar.cc/150?img=2" },
                    { name: "Сакура", desc: "Целительница, добрая и отзывчивая", tags: ["фэнтези", "целитель"], rating: 4.7, avatar: "https://i.pravatar.cc/150?img=3" },
                    { name: "Зеро", desc: "Беспилотный андроид, ищет смысл", tags: ["научная фантастика"], rating: 4.6, avatar: "https://i.pravatar.cc/150?img=4" },
                ];

                const html = `
                    <div class="portal-header">
                        <h2>Портал</h2>
                        <p>Найди своего героя</p>
                        <div class="online-stats"><i data-lucide="circle"></i> 47 героев сейчас в сети</div>
                    </div>
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchInput" placeholder="Имя, тег или характер...">
                    </div>
                    <div class="categories" id="categories">
                        <div class="category-chip" data-cat="all">Все</div>
                        <div class="category-chip" data-cat="popular">Популярные</div>
                        <div class="category-chip" data-cat="new">Новинки</div>
                        <div class="category-chip" data-cat="friends">Друзья</div>
                        <div class="category-chip" data-cat="active">В сети</div>
                    </div>
                    <div class="trending">
                        <div class="trending-label"><i data-lucide="trending-up"></i> Популярные запросы</div>
                        <div class="trending-chips" id="trendingChips">
                            <div class="trending-chip">киберпанк</div>
                            <div class="trending-chip">целитель</div>
                            <div class="trending-chip">андроид</div>
                            <div class="trending-chip">хакер</div>
                        </div>
                    </div>
                    <div id="charactersList" class="characters-list"></div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();

                const searchInput = document.getElementById('searchInput');
                const categories = document.querySelectorAll('.category-chip');
                const trendingChips = document.querySelectorAll('.trending-chip');
                const charactersList = document.getElementById('charactersList');

                let activeCategory = 'all';
                function renderCharacters() {
                    const query = searchInput.value.toLowerCase();
                    let filtered = [...demoCharacters];
                    if (query) {
                        filtered = filtered.filter(c => 
                            c.name.toLowerCase().includes(query) || 
                            c.tags.some(t => t.includes(query)) ||
                            c.desc.toLowerCase().includes(query)
                        );
                    }
                    if (activeCategory === 'popular') filtered = filtered.sort((a,b) => b.rating - a.rating);
                    if (activeCategory === 'new') filtered = filtered.slice(0, 3);
                    if (activeCategory === 'active') filtered = filtered.filter((_, i) => i % 2 === 0);
                    if (activeCategory === 'friends') filtered = filtered.slice(0, 2);

                    if (filtered.length === 0) {
                        charactersList.innerHTML = '<div class="empty-state">✨ Ничего не найдено</div>';
                        return;
                    }
                    charactersList.innerHTML = filtered.map((c, idx) => `
                        <div class="character-card" style="animation-delay: ${idx * 0.05}s">
                            <div class="card-row">
                                <div class="card-avatar" style="background-image: url('${c.avatar}');"></div>
                                <div class="card-info">
                                    <div class="card-name">
                                        ${escapeHtml(c.name)}
                                        <div class="card-rating"><i data-lucide="star"></i> ${c.rating}</div>
                                    </div>
                                    <div class="card-desc">${escapeHtml(c.desc)}</div>
                                    <div class="card-tags">${c.tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('')}</div>
                                    <div class="card-actions">
                                        <button class="btn-chat" data-name="${escapeHtml(c.name)}" data-avatar="${c.avatar}">Общаться →</button>
                                        <button class="btn-like" data-name="${c.name}"><i data-lucide="heart"></i> 24</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    lucide.createIcons();
                    document.querySelectorAll('.btn-chat').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const name = btn.dataset.name;
                            const avatar = btn.dataset.avatar;
                            renderChat(name, avatar);
                        });
                    });
                    document.querySelectorAll('.btn-like').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            tg.HapticFeedback?.impactOccurred('light');
                            btn.classList.toggle('active');
                        });
                    });
                }

                searchInput.addEventListener('input', renderCharacters);
                categories.forEach(cat => {
                    cat.addEventListener('click', () => {
                        categories.forEach(c => c.classList.remove('active'));
                        cat.classList.add('active');
                        activeCategory = cat.dataset.cat;
                        renderCharacters();
                    });
                });
                trendingChips.forEach(chip => {
                    chip.addEventListener('click', () => {
                        searchInput.value = chip.innerText;
                        renderCharacters();
                    });
                });
                categories[0].classList.add('active');
                renderCharacters();
            }

            // Конструктор
            function renderHome() {
                let avatarHtml = photo ? `<div class="avatar-circle" id="avatar-circle" style="background-image: url('${photo}');"></div>` :
                                          `<div class="avatar-circle" id="avatar-circle"><div class="avatar-placeholder">🧬</div></div>`;
                const html = `
                    <div class="neuro-header"><h1>NEURO BRO</h1></div>
                    <div class="avatar-block">${avatarHtml}<div class="avatar-label" id="upload-label">[ ОБРАЗ ]</div></div>
                    <div class="input-group"><div class="input-label">[ ИМЯ ]</div><input type="text" class="input-field" id="nameInput" value="${escapeHtml(character.name)}" maxlength="30"></div>
                    <div class="input-group"><div class="input-label">[ ПОЛ ]</div><div class="gender-chips" id="genderChips"><div class="chip ${character.gender === 'male' ? 'active' : ''}" data-gender="male">М</div><div class="chip ${character.gender === 'female' ? 'active' : ''}" data-gender="female">Ж</div><div class="chip ${character.gender === 'other' ? 'active' : ''}" data-gender="other">⚥</div></div></div>
                    <div class="input-group"><div class="input-label">[ ГОЛОС ]</div><input type="text" class="input-field" id="greetingInput" value="${escapeHtml(character.greeting)}" maxlength="100"><div class="char-counter" id="greetingCounter">${character.greeting?.length || 0}/100</div></div>
                    <div class="input-group"><div class="input-label">[ ИСТОРИЯ ]</div><input type="text" class="input-field" id="storyInput" value="${escapeHtml(character.story)}" maxlength="200"><div class="char-counter" id="storyCounter">${character.story?.length || 0}/200</div></div>
                    <div class="main-buttons"><button class="btn btn-outline" id="resetBtn">СБРОС</button><button class="btn btn-primary" id="activateBtn">ПРОБУДИТЬ</button></div>
                `;
                contentArea.innerHTML = html;
                document.getElementById('avatar-circle')?.addEventListener('click', () => fileInput.click());
                document.getElementById('upload-label')?.addEventListener('click', () => fileInput.click());

                const nameInput = document.getElementById('nameInput');
                const greetingInput = document.getElementById('greetingInput');
                const storyInput = document.getElementById('storyInput');
                const genderChips = document.querySelectorAll('.chip');
                const resetBtn = document.getElementById('resetBtn');
                const activateBtn = document.getElementById('activateBtn');

                nameInput?.addEventListener('input', (e) => { character.name = e.target.value; saveCharacter(); });
                greetingInput?.addEventListener('input', (e) => { character.greeting = e.target.value; saveCharacter(); document.getElementById('greetingCounter').textContent = `${e.target.value.length}/100`; });
                storyInput?.addEventListener('input', (e) => { character.story = e.target.value; saveCharacter(); document.getElementById('storyCounter').textContent = `${e.target.value.length}/200`; });
                genderChips.forEach(chip => {
                    chip.addEventListener('click', function() {
                        genderChips.forEach(c => c.classList.remove('active'));
                        this.classList.add('active');
                        character.gender = this.dataset.gender;
                        saveCharacter();
                    });
                });
                resetBtn?.addEventListener('click', () => {
                    character = { name: '', gender: 'male', greeting: '', story: '' };
                    saveCharacter();
                    setPhoto(null);
                    renderHome();
                    tg.HapticFeedback?.impactOccurred('light');
                });
                activateBtn?.addEventListener('click', () => {
                    loader.classList.add('show');
                    tg.HapticFeedback?.impactOccurred('medium');
                    setTimeout(() => {
                        loader.classList.remove('show');
                        console.log('Персонаж:', { ...character, photo: photo ? 'есть' : 'нет' });
                        tg.showAlert('Данные готовы (консоль)');
                    }, 1500);
                });
            }

            function renderGames() { contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="layout-grid" style="width:48px;height:48px;margin-bottom:20px;"></i><br>МИНИ-ИГРЫ<br>скоро здесь появятся активности</div>'; lucide.createIcons(); }
            function renderSettings() { contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="menu" style="width:48px;height:48px;margin-bottom:20px;"></i><br>НАСТРОЙКИ<br>профиль, уведомления, тема</div>'; lucide.createIcons(); }

            // Переключение вкладок
            barItems.forEach(item => {
                item.addEventListener('click', () => {
                    const tab = item.dataset.tab;
                    if (tab === 'center') {
                        sheetOverlay.classList.add('show');
                        tg.HapticFeedback?.impactOccurred('medium');
                        return;
                    }
                    sheetOverlay.classList.remove('show');
                    barItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    if (tab === 'feed') renderFeed();
                    if (tab === 'chats') renderChats();
                    if (tab === 'games') renderGames();
                    if (tab === 'settings') renderSettings();
                    tg.HapticFeedback?.impactOccurred('light');
                });
            });

            createCharacterBtn.addEventListener('click', () => {
                sheetOverlay.classList.remove('show');
                barItems.forEach(i => i.classList.remove('active'));
                renderHome();
                tg.HapticFeedback?.impactOccurred('medium');
            });
            createGroupBtn.addEventListener('click', () => {
                sheetOverlay.classList.remove('show');
                alert('Создание группы — будет позже');
                tg.HapticFeedback?.impactOccurred('medium');
            });
            sheetOverlay.addEventListener('click', (e) => { if (e.target === sheetOverlay) sheetOverlay.classList.remove('show'); });

            setTimeout(() => progressFill.style.width = '100%', 100);
            setTimeout(() => {
                splash.classList.add('hidden');
                mainContent.classList.add('visible');
                tg.HapticFeedback?.impactOccurred('medium');
            }, 3200);

            renderFeed();
            document.querySelector('.bar-item[data-tab="feed"]').classList.add('active');

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
        })();
    </script>
</body>
</html>
