<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NeuroBro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: system-ui;
            padding: 16px;
            padding-bottom: 80px;
            margin: 0;
        }
        #chat {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
        }
        .user {
            background: #2481cc;
            align-self: flex-end;
        }
        .bot {
            background: #2a2a2a;
            align-self: flex-start;
        }
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1e1e1e;
            padding: 12px;
            display: flex;
            gap: 8px;
            border-top: 1px solid #333;
        }
        input {
            flex: 1;
            background: #2a2a2a;
            border: none;
            padding: 12px;
            border-radius: 24px;
            color: white;
            font-size: 16px;
        }
        button {
            background: #2481cc;
            border: none;
            padding: 12px 20px;
            border-radius: 24px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="Написать...">
        <button id="send">→</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const chatId = tg.initDataUnsafe.user?.id || 7015403070;
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, message: text })
                });
                const data = await res.json();
                addMessage(data.reply || '🌫️ Тишина...', 'bot');
            } catch(e) {
                addMessage('🌫️ Ошибка связи', 'bot');
            }
        }

        sendBtn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
