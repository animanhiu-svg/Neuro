<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroBro · портал</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <style>
        /* ========================================== */
        /* МОДУЛЬ №1: БАЗОВЫЕ СТИЛИ И АНИМАЦИИ         */
        /* ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #fff;
            min-height: 100vh;
        }
        @keyframes bounce {
            0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
            30% { transform: scale(1.5); opacity: 1; }
        }
        @keyframes typingDot {
            0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
            30% { transform: scale(1.5); opacity: 1; }
        }
        
        /* ========================================== */
        /* МОДУЛЬ №2: СПЛЭШ-ЭКРАН                      */
        /* ========================================== */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s;
        }
        #splash-screen.hidden { opacity: 0; pointer-events: none; }
        .splash-avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: #1e1e1e;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .splash-avatar span { font-size: 48px; color: #fff; }
        .splash-name { font-size: 32px; font-weight: 600; color: #fff; margin-bottom: 16px; }
        .splash-quote { font-size: 12px; color: #aaa; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 4px; }
        .progress-container { width: 200px; height: 2px; background: #333; }
        .progress-fill { height: 100%; width: 0%; background: #fff; transition: width 3s linear; }
        
        /* ========================================== */
        /* МОДУЛЬ №3: ОСНОВНОЙ КОНТЕНТ                 */
        /* ========================================== */
        #main-content {
            opacity: 0;
            transition: opacity 0.5s;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #main-content.visible { opacity: 1; }
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* ========================================== */
        /* МОДУЛЬ №4: НИЖНЯЯ ПАНЕЛЬ НАВИГАЦИИ         */
        /* ========================================== */
        .bottom-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #000;
            padding: 8px 0 12px;
            border-radius: 30px 30px 0 0;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            font-size: 10px;
            opacity: 0.7;
            transition: transform 0.1s, opacity 0.2s;
            cursor: pointer;
            flex: 1;
            padding: 4px 0;
        }
        .bar-item.active { opacity: 1; }
        .bar-item:active { transform: scale(0.92); }
        .bar-item svg { width: 24px !important; height: 24px !important; margin-bottom: 4px; }
        
        /* ========================================== */
        /* МОДУЛЬ №5: ПОРТАЛ (СПИСОК ПЕРСОНАЖЕЙ)       */
        /* ========================================== */
        .portal-header { margin-bottom: 24px; }
        .portal-header h2 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .portal-header p { font-size: 14px; color: #aaa; margin-bottom: 12px; }
        .search-box {
            display: flex; align-items: center;
            background: #1e1e1e; border-radius: 30px; padding: 12px 18px;
            margin-bottom: 20px; border: 1px solid #333;
        }
        .search-box:focus-within { border-color: #fff; }
        .search-box i { width: 20px; height: 20px; margin-right: 12px; color: #aaa; }
        .search-box input {
            background: transparent; border: none; outline: none;
            color: #fff; font-size: 16px; width: 100%;
        }
        .characters-list { display: flex; flex-direction: column; gap: 16px; }
        .character-card {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 12px;
            border: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            cursor: pointer;
        }
        .character-card:active { transform: scale(0.98); }
        .card-avatar {
            width: 60px; height: 60px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-color: #333;
            flex-shrink: 0;
        }
        .card-info { flex: 1; }
        .card-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .card-greeting { font-size: 12px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* ========================================== */
        /* МОДУЛЬ №6: ЧАТ                             */
        /* ========================================== */
        .chat-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #333;
        }
        .chat-back {
            background: transparent; border: none; color: #fff;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            font-size: 14px; padding: 6px 12px; border-radius: 30px;
        }
        .chat-back:active { background: rgba(255,255,255,0.1); }
        .chat-avatar { width: 40px; height: 40px; border-radius: 50%; background-size: cover; background-position: center; }
        .chat-name { font-size: 18px; font-weight: 600; }
        .messages {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.bot {
            align-self: flex-start;
            align-items: flex-start;
            flex-direction: row;
            gap: 8px;
        }
        .message-bubble {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 14px;
            word-break: break-word;
        }
        .message.user .message-bubble { background: #2481cc; color: #fff; }
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            margin-top: 4px;
        }
        .message-content { display: flex; flex-direction: column; max-width: calc(100% - 40px); }
        .message-time { font-size: 10px; color: #888; margin-top: 4px; margin-left: 8px; margin-right: 8px; }
        .chat-input-container {
            display: flex;
            gap: 10px;
            margin-top: auto;
            background: #1e1e1e;
            border-radius: 30px;
            padding: 8px 12px;
            border: 1px solid #333;
        }
        .chat-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 14px; }
        .chat-send { background: transparent; border: none; color: #fff; cursor: pointer; padding: 6px; display: flex; align-items: center; }
        
        /* ========================================== */
        /* МОДУЛЬ №7: АНИМАЦИЯ ПЕЧАТИ                 */
        /* ========================================== */
        .typing-dots {
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            padding: 10px 14px;
            border-radius: 20px;
        }
        .typing-dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #fff;
            animation: typingDot 1.4s ease-in-out infinite;
        }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        /* ========================================== */
        /* МОДУЛЬ №8: КОНСТРУКТОР ПЕРСОНАЖА           */
        /* ========================================== */
        .neuro-header { text-align: center; margin-bottom: 24px; }
        .neuro-header h1 { font-size: 28px; font-weight: 600; color: #fff; }
        .avatar-block { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #1e1e1e;
            border: 2px solid #fff;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .camera-icon { width: 80px !important; height: 80px !important; color: #fff; }
        .avatar-label { font-size: 14px; color: #aaa; text-decoration: underline; cursor: pointer; }
        .input-group { margin-bottom: 20px; }
        .input-label { font-size: 12px; color: #aaa; text-transform: uppercase; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .input-field, .input-textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            padding: 8px 0;
            font-size: 16px;
            color: #fff;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .input-textarea {
            border: 1px solid #444;
            border-radius: 16px;
            padding: 10px;
            margin-top: 4px;
            resize: vertical;
        }
        .input-field:focus, .input-textarea:focus { border-bottom-color: #fff; border-color: #fff; }
        .gender-chips { display: flex; gap: 16px; margin-top: 8px; }
        .chip {
            background: transparent;
            border: 1px solid #444;
            border-radius: 30px;
            padding: 8px 24px;
            font-size: 15px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chip.active { border-color: #fff; color: #fff; }
        .char-counter { text-align: right; font-size: 10px; color: #666; margin-top: 4px; }
        .hint { font-size: 11px; color: #777; margin-top: 4px; line-height: 1.4; }
        .main-buttons { display: flex; gap: 16px; margin-top: 32px; }
        .btn {
            flex: 1;
            padding: 16px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-outline { background: transparent; border: 1px solid #fff; color: #fff; }
        .btn-primary { background: #fff; color: #121212; }
        
        /* ========================================== */
        /* МОДУЛЬ №9: КАДРИРОВАНИЕ ФОТО               */
        /* ========================================== */
        .crop-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .crop-modal.show { display: flex; }
        .crop-container {
            width: 300px; height: 300px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #fff;
            margin-bottom: 30px;
        }
        .crop-image { max-width: 100%; max-height: 100%; }
        .crop-controls { display: flex; gap: 20px; }
        .crop-btn {
            background: transparent; border: 1px solid #fff; color: #fff;
            padding: 12px 30px; border-radius: 40px; font-size: 16px;
            cursor: pointer;
        }
        .crop-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        .crop-btn.primary { background: #fff; color: #000; }
        #file-input { display: none; }
        
        /* ========================================== */
        /* МОДУЛЬ №10: ДОПОЛНИТЕЛЬНЫЕ СТИЛИ           */
        /* ========================================== */
        .placeholder-page { text-align: center; padding: 60px 20px; color: #aaa; }
        .empty-state { text-align: center; padding: 40px 20px; color: #aaa; }
        .chats-list { display: flex; flex-direction: column; gap: 12px; }
        .chat-item {
            display: flex; align-items: center; gap: 12px;
            background: #1a1a1a; border-radius: 20px; padding: 12px;
            border: 1px solid #2a2a2a; cursor: pointer;
        }
        .chat-item:active { transform: scale(0.98); }
        .chat-item-avatar {
            width: 50px; height: 50px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }
        .chat-item-info { flex: 1; min-width: 0; }
        .chat-item-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .chat-item-last { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .empty-chats { text-align: center; padding: 40px 20px; color: #aaa; }
        .resend-btn {
            background: white;
            border: none;
            border-radius: 20px;
            padding: 4px 12px;
            margin-top: 6px;
            font-size: 11px;
            color: #121212;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <input type="file" id="file-input" accept="image/*">
    
    <!-- ========================================== -->
    <!-- МОДУЛЬ №11: СПЛЭШ-ЭКРАН (HTML)              -->
    <!-- ========================================== -->
    <div id="splash-screen">
        <div class="splash-avatar"><span>🧬</span></div>
        <div class="splash-name">NEURO BRO</div>
        <div class="splash-quote">ТИШИНА В ЧЕРНО-БЕЛОМ</div>
        <div class="progress-container"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    
    <!-- ========================================== -->
    <!-- МОДУЛЬ №12: ОСНОВНОЙ КОНТЕЙНЕР             -->
    <!-- ========================================== -->
    <div id="main-content">
        <div class="content-area" id="content-area"></div>
        <div class="bottom-bar">
            <div class="bar-item" data-tab="feed"><i data-lucide="globe"></i><span>Портал</span></div>
            <div class="bar-item" data-tab="chats"><i data-lucide="message-circle-more"></i><span>Чаты</span></div>
            <div class="bar-item" data-tab="center"><i data-lucide="circle-user"></i><span>Центр</span></div>
            <div class="bar-item" data-tab="games"><i data-lucide="layout-grid"></i><span>Игры</span></div>
            <div class="bar-item" data-tab="profile"><i data-lucide="menu"></i><span>Профиль</span></div>
        </div>
    </div>
    
    <!-- ========================================== -->
    <!-- МОДУЛЬ №13: МОДАЛКА КАДРИРОВАНИЯ           -->
    <!-- ========================================== -->
    <div class="crop-modal" id="crop-modal">
        <div class="crop-container"><img src="" id="crop-image" class="crop-image"></div>
        <div class="crop-controls">
            <button class="crop-btn" id="crop-cancel">Отмена</button>
            <button class="crop-btn primary" id="crop-apply">Готово</button>
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        /* ========================================== */
        /* МОДУЛЬ №14: ИНИЦИАЛИЗАЦИЯ TELEGRAM WEBAPP  */
        /* ========================================== */
        (function() {
            const tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();

            const user_id = tg.initDataUnsafe.user?.id;
            const chat_id = (user_id && user_id !== 0) ? user_id : 7015403070;

            lucide.createIcons();

            let characters = [];
            try {
                const saved = localStorage.getItem('characters');
                if (saved) characters = JSON.parse(saved);
            } catch(e) {}

            function saveCharacters() {
                localStorage.setItem('characters', JSON.stringify(characters));
            }

            let draft = JSON.parse(localStorage.getItem('character_draft')) || {
                tempId: Date.now(),
                name: '',
                gender: 'male',
                age: '',
                greeting: '',
                appearance: '',
                personality: '',
                scenario: '',
                memory: '',
                tags: '',
                photo: null
            };

            function syncDraft() {
                localStorage.setItem('character_draft', JSON.stringify(draft));
            }

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    syncDraft();
                }
            });

            /* ========================================== */
            /* МОДУЛЬ №15: КАДРИРОВАНИЕ ФОТО (ЛОГИКА)     */
            /* ========================================== */
            let pendingCharacterId = null;
            const cropModal = document.getElementById('crop-modal');
            const cropImage = document.getElementById('crop-image');
            const cropCancel = document.getElementById('crop-cancel');
            const cropApply = document.getElementById('crop-apply');
            let cropper = null;
            let pendingFile = null;

            function openCrop(file, charId) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    cropImage.src = e.target.result;
                    cropModal.classList.add('show');
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(cropImage, {
                        aspectRatio: 1,
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 1,
                        cropBoxMovable: false,
                        cropBoxResizable: false,
                        toggleDragModeOnDblclick: false,
                        background: false,
                        modal: false,
                        guides: false,
                        center: false,
                        highlight: false
                    });
                    pendingFile = file;
                    pendingCharacterId = charId;
                };
                reader.readAsDataURL(file);
            }

            cropCancel.addEventListener('click', () => {
                cropModal.classList.remove('show');
                if (cropper) cropper.destroy();
                pendingFile = null;
                pendingCharacterId = null;
            });

            cropApply.addEventListener('click', () => {
                if (!cropper || !pendingFile || pendingCharacterId === null) return;
                const canvas = cropper.getCroppedCanvas({ width: 300, height: 300, imageSmoothingQuality: 'high' });
                const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                draft.photo = croppedDataUrl;
                syncDraft();
                if (pendingCharacterId !== null) {
                    const idx = characters.findIndex(c => c.id === pendingCharacterId);
                    if (idx !== -1) {
                        characters[idx].photo = croppedDataUrl;
                        saveCharacters();
                    }
                }
                cropModal.classList.remove('show');
                cropper.destroy();
                pendingFile = null;
                if (document.querySelector('.bar-item.active')?.dataset.tab === 'center') {
                    renderCenter(pendingCharacterId);
                }
                pendingCharacterId = null;
            });

            /* ========================================== */
            /* МОДУЛЬ №16: ОТПРАВКА СООБЩЕНИЙ В ЧАТ      */
            /* ========================================== */
                        
            function addMessageToUI(container, text, sender, time, avatarUrl) {
                if (sender === 'user') {
                    const div = document.createElement('div');
                    div.className = 'message user';
                    div.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
                    container.appendChild(div);
                } else {
                    const div = document.createElement('div');
                    div.className = 'message bot';
                    div.innerHTML = `
                        <div class="message-avatar" style="background-image: url('${avatarUrl || ""}');"></div>
                        <div class="message-content">
                            <div class="message-bubble">${escapeHtml(text)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                    container.appendChild(div);
                }
                container.scrollTop = container.scrollHeight;
            }

            async function sendMessageToServer(character, text, messagesContainer, storageKey, onReply) {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message bot';
                typingDiv.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
                messagesContainer.appendChild(typingDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                let userPromptParts = [];
                userPromptParts.push(`Ты — персонаж с именем ${character.name}. Твоя задача — играть эту роль. Никогда не называй себя другими именами и не будь ассистентом.`);
                if (character.gender) userPromptParts.push(`Твой пол: ${character.gender}.`);
                if (character.age) userPromptParts.push(`Твой возраст: ${character.age}.`);
                if (character.personality) userPromptParts.push(`Твой характер: ${character.personality}.`);
                if (character.scenario) userPromptParts.push(`Сейчас происходит: ${character.scenario}.`);
                const userPrompt = userPromptParts.join('\n');

                const payload = {
    chat_id: chat_id,
    character_id: character.id,
    message: text,
    character: {
        nsfw_mode: false,
        user_prompt: userPrompt
    },
    history: []
};

                try {
                    const stored = JSON.parse(localStorage.getItem(storageKey)) || [];
                    payload.history = stored.slice(-15).map(msg => ({
                        role: msg.sender === 'user' ? 'user' : 'assistant',
                        content: msg.text
                    }));
                } catch(e) {}

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 90000);
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    const replyText = data.reply || '🌫️ Тишина...';
                    typingDiv.remove();
                    const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                    addMessageToUI(messagesContainer, replyText, 'bot', time, character.photo);
                    let messages = [];
                    try { messages = JSON.parse(localStorage.getItem(storageKey)) || []; } catch(e) {}
                    messages.push({ text: replyText, sender: 'bot', time, avatar: character.photo });
                    localStorage.setItem(storageKey, JSON.stringify(messages));
                    if (onReply) onReply(replyText);
                    
                } catch (err) {
                    console.error(err);
                    typingDiv.remove();
                    
                    const errorMessages = [
                        '🌫️ Тишина... персонаж задумался',

function renderChat(character) {
    const storageKey = `chat_${character.id}`;

    try { messages = JSON.parse(localStorage.getItem(storageKey)) || []; } catch(e) {}

    const html = `
        <div class="chat-header">

        </div>
    `;
    contentArea.innerHTML = html;
    lucide.createIcons();

    const messagesContainer = document.getElementById('chat-messages');
    const input = document.getElementById('chat-input');
    const sendBtn = document.getElementById('chat-send');
    const backBtn = document.getElementById('chat-back');

    // Кнопка очистки чата
    const clearBtn = document.getElementById('clearChatBtn');
    if (clearBtn) {
        clearBtn.addEventListener('click', async () => {
            if (confirm('Очистить историю чата с этим персонажем?')) {
                // Очищаем локальную историю
                localStorage.setItem(storageKey, JSON.stringify([]));
                messages = [];
                messagesContainer.innerHTML = '';
                
                // Очищаем историю на сервере
                try {
                    await fetch('/clear_history', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            chat_id: chat_id, 
                            character_id: character.id 
                        })
                    });
                } catch(e) {
                    console.error('Ошибка очистки истории на сервере:', e);
                }
                
                // Добавляем сценарий обратно (если есть)
                if (character.scenario) {
                    const scenarioWrapper = document.createElement('div');
                    scenarioWrapper.style.position = 'relative';
                    scenarioWrapper.style.marginBottom = '20px';
                    scenarioWrapper.style.marginTop = '30px';

                             alt="decor">
                        <div style="background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%); border-radius: 40px; border: 1px solid rgba(255,255,255,0.15); padding: 20px;">
                            <div style="font-size: 14px; line-height: 1.5; color: rgba(255,255,255,0.85); font-style: italic; text-align: center;">${escapeHtml(character.scenario)}</div>
                        </div>
                    `;
                    messagesContainer.appendChild(scenarioWrapper);
                }
                
                if (tg.showAlert) tg.showAlert('Чат очищен');
            }
        });
    }

    // Добавляем сценарий в начало чата (если есть)
    if (character.scenario) {
        const scenarioWrapper = document.createElement('div');
        scenarioWrapper.style.position = 'relative';
        scenarioWrapper.style.marginBottom = '20px';
        scenarioWrapper.style.marginTop = '30px';
        scenarioWrapper.innerHTML = `
            <img src="https://raw.githubusercontent.com/animanhiu-svg/Neuro/main/mini_app/feather.png" 
                 style="position: absolute; top: -34px; left: 50%; transform: translateX(-50%); width: 260px; z-index: 10;"
                 alt="decor">
            <div style="background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%); border-radius: 40px; border: 1px solid rgba(255,255,255,0.15); padding: 20px;">
                <div style="font-size: 14px; line-height: 1.5; color: rgba(255,255,255,0.85); font-style: italic; text-align: center;">${escapeHtml(character.scenario)}</div>
            </div>
        `;
        messagesContainer.appendChild(scenarioWrapper);
    }

    messages.forEach(msg => {
        addMessageToUI(messagesContainer, msg.text, msg.sender, msg.time, msg.avatar || character.photo);
    });

    function addUserMessage(text) {
        const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        addMessageToUI(messagesContainer, text, 'user', time);
        messages.push({ text, sender: 'user', time });
        localStorage.setItem(storageKey, JSON.stringify(messages));
    }

     async function handleSend() {
    const text = input.value.trim();
    if (!text) return;
    
    // Удаляем все старые сообщения с ошибкой
    const oldErrorMessages = document.querySelectorAll('.message.bot .resend-btn');
    for (let i = 0; i < oldErrorMessages.length; i++) {
        const errorDiv = oldErrorMessages[i].closest('.message.bot');
        if (errorDiv) errorDiv.remove();
    }
    
    addUserMessage(text);
    input.value = '';
    await sendMessageToServer(character, text, messagesContainer, storageKey, (reply) => {
        messages.push({ text: reply, sender: 'bot', time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }), avatar: character.photo });
        localStorage.setItem(storageKey, JSON.stringify(messages));
    });
}

    sendBtn.addEventListener('click', handleSend);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    backBtn.addEventListener('click', () => renderFeed());
}

                    if (!localStorage.getItem(chatKey)) {
                        localStorage.setItem(chatKey, JSON.stringify([]));
                    }
                    
                    setTimeout(() => {
                        overlay.remove();
                        renderChat(updatedData);
                    }, 1500);
                });
            }

            /* ========================================== */
            /* МОДУЛЬ №21: ПРОФИЛЬ И НАСТРОЙКИ            */
            /* ========================================== */
            function renderProfile() {
                const html = `
                    <div style="text-align: center; padding: 40px 20px;">
                        <i data-lucide="menu" style="width:48px;height:48px;margin-bottom:20px;"></i>
                        <p style="margin-bottom: 30px;">НАСТРОЙКИ</p>
                        <button id="clearDataBtn" style="background: #ff4d4d; border: none; color: white; padding: 12px 24px; border-radius: 40px; font-weight: bold; font-size: 16px; cursor: pointer; width: 80%;">🗑️ Очистить все данные</button>
                        <p style="font-size: 12px; color: #aaa; margin-top: 20px;">Удалятся все персонажи, чаты и фото.</p>
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();
                const clearBtn = document.getElementById('clearDataBtn');
                clearBtn.addEventListener('click', () => {
                    const keysToKeep = ['tgWebAppData', 'tgWebAppPlatform', 'tgWebAppThemeParams', 'tgWebAppVersion'];
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const key = localStorage.key(i);
                        if (key && !keysToKeep.includes(key)) {
                            localStorage.removeItem(key);
                        }
                    }
                    characters = [];
                    saveCharacters();
                    draft = {
                        tempId: Date.now(),
                        name: '',
                        gender: 'male',
                        age: '',
                        greeting: '',
                        appearance: '',
                        personality: '',
                        scenario: '',
                        memory: '',
                        tags: '',
                        photo: null
                    };
                    syncDraft();
                    tg.showAlert('Все данные очищены!');
                    renderFeed();
                    document.querySelectorAll('.bar-item').forEach(i => i.classList.remove('active'));
                    document.querySelector('.bar-item[data-tab="feed"]').classList.add('active');
                });
            }

            /* ========================================== */
            /* МОДУЛЬ №22: ИГРЫ (ЗАГЛУШКА)               */
            /* ========================================== */
            function renderGames() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="layout-grid" style="width:48px;height:48px;margin-bottom:20px;"></i><br>МИНИ-ИГРЫ<br>скоро здесь появятся активности</div>';
                lucide.createIcons();
            }

            /* ========================================== */
            /* МОДУЛЬ №23: НАВИГАЦИЯ                     */
            /* ========================================== */
            const contentArea = document.getElementById('content-area');
            const barItems = document.querySelectorAll('.bar-item');

            barItems.forEach(item => {
                item.addEventListener('click', () => {
                    if (document.querySelector('.bar-item.active')?.dataset.tab === 'center') {
                        syncDraft();
                    }
                    barItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const tab = item.dataset.tab;
                    if (tab === 'feed') renderFeed();
                    else if (tab === 'chats') renderChats();
                    else if (tab === 'center') renderCenter(currentEditId);
                    else if (tab === 'games') renderGames();
                    else if (tab === 'profile') renderProfile();
                    tg.HapticFeedback?.impactOccurred('light');
                });
            });

            /* ========================================== */
            /* МОДУЛЬ №24: ЗАПУСК                         */
            /* ========================================== */
            const splash = document.getElementById('splash-screen');
            const progressFill = document.getElementById('progress-fill');
            if (progressFill) {
                setTimeout(() => progressFill.style.width = '100%', 100);
            }
            setTimeout(() => {
                if (splash) splash.classList.add('hidden');
                const mainContent = document.getElementById('main-content');
                if (mainContent) mainContent.classList.add('visible');
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            }, 3200);

            renderFeed();
            const firstBar = document.querySelector('.bar-item[data-tab="feed"]');
            if (firstBar) firstBar.classList.add('active');

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
            }
        })();
    </script>
</body>
</html>
