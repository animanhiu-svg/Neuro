<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroBro · портал</title>
    <!-- Lucide Icons (линейные, outline) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== СПЛЭШ ===== */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease-out;
            pointer-events: all;
        }
        #splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .splash-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1e1e1e;
            border: 2px solid #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .splash-avatar span {
            font-size: 48px;
            color: #fff;
        }
        .splash-name {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #fff;
            margin-bottom: 16px;
        }
        .splash-quote {
            font-size: 12px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #aaa;
            margin-bottom: 30px;
        }
        .progress-container {
            width: 200px;
            height: 2px;
            background: #333;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #fff;
            transition: width 3s linear;
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        #main-content {
            opacity: 0;
            transition: opacity 0.5s ease-in;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #main-content.visible {
            opacity: 1;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
        }

        /* ===== НИЖНЯЯ ПАНЕЛЬ ===== */
        .bottom-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #000000;
            padding: 8px 0 12px;
            position: relative;
            border-top: none;
        }

        /* Градиентная линия с затуханием по краям (70% ширины) */
        .bottom-bar::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.8), transparent);
            pointer-events: none;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            font-size: 10px;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.1s ease;
            cursor: pointer;
            flex: 1;
            opacity: 0.7;
        }
        .bar-item.active {
            opacity: 1;
        }
        .bar-item i {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            stroke-width: 1.5;
        }

        /* ===== BOTTOM SHEET ===== */
        .sheet-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(3px);
            z-index: 1100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            display: flex;
            align-items: flex-end;
        }
        .sheet-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .sheet {
            background: #121212;
            border-top: 1px solid #fff;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px 30px;
            width: 100%;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .sheet-overlay.show .sheet {
            transform: translateY(0);
        }
        .sheet-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid #333;
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            cursor: pointer;
        }
        .sheet-item:last-child {
            border-bottom: none;
        }
        .sheet-item i {
            width: 24px;
            height: 24px;
            stroke-width: 1.5;
        }

        /* ===== АНИМАЦИЯ НАЖАТИЯ ===== */
        .bar-item:active,
        .sheet-item:active,
        .action-btn:active,
        .btn:active,
        .avatar-circle:active,
        .avatar-label:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
        }

        .placeholder-page {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 16px;
            line-height: 1.8;
        }

        /* ===== КОНСТРУКТОР ===== */
        .neuro-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .neuro-header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #fff;
        }
        .avatar-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
        }
        .avatar-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1e1e1e;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            margin-bottom: 8px;
            transition: transform 0.1s ease;
        }
        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-placeholder {
            font-size: 40px;
            color: #fff;
        }
        .avatar-label {
            font-size: 13px;
            font-weight: 400;
            color: #aaa;
            text-decoration: underline;
            text-underline-offset: 4px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .stats {
            width: 100%;
            margin-bottom: 32px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .stat-icon {
            width: 24px;
            font-size: 16px;
            color: #fff;
        }
        .stat-bar {
            flex: 1;
            height: 6px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .stat-fill {
            height: 100%;
            background: #fff;
            border-radius: 10px;
            width: 0%;
        }
        .stat-value {
            font-size: 12px;
            color: #aaa;
            width: 35px;
            text-align: right;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 12px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 6px;
        }
        .input-field {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            padding: 8px 0;
            font-size: 16px;
            color: #fff;
            outline: none;
        }
        .input-field:focus {
            border-bottom-color: #fff;
        }
        .gender-chips {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }
        .chip {
            background: transparent;
            border: 1px solid #444;
            border-radius: 30px;
            padding: 8px 24px;
            font-size: 15px;
            font-weight: 500;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            flex: 0 1 auto;
        }
        .chip.active {
            border-color: #fff;
            color: #fff;
        }
        .char-counter {
            text-align: right;
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }
        .action-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 32px 0 24px;
            justify-content: center;
        }
        .action-btn {
            background: #1e1e1e;
            border: 1px solid #444;
            border-radius: 40px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s ease;
            flex: 1 0 auto;
            max-width: 160px;
            justify-content: center;
        }
        .main-buttons {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        .btn {
            flex: 1;
            padding: 16px 0;
            border-radius: 40px;
            font-weight: 600;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s, transform 0.1s ease;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
        }
        .btn-primary {
            background: #fff;
            color: #121212;
        }
        .btn-primary:hover {
            background: #e0e0e0;
        }
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .loader-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .loader-content {
            background: #1e1e1e;
            border: 1px solid #fff;
            border-radius: 40px;
            padding: 30px 40px;
            text-align: center;
        }
        .loader-text {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }
        .loader-sub {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <input type="file" id="file-input" accept="image/*">

    <!-- СПЛЭШ -->
    <div id="splash-screen">
        <div class="splash-avatar" id="splash-avatar">
            <span id="splash-placeholder">🧬</span>
            <img id="splash-image" src="#" alt="" style="display: none;">
        </div>
        <div class="splash-name">NEURO BRO</div>
        <div class="splash-quote">ТИШИНА В ЧЕРНО-БЕЛОМ</div>
        <div class="progress-container">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="main-content">
        <div class="content-area" id="content-area"></div>

        <!-- НИЖНЯЯ ПАНЕЛЬ (иконки Lucide) -->
        <div class="bottom-bar">
            <div class="bar-item" data-tab="feed"><i data-lucide="globe"></i><span>Портал</span></div>
            <div class="bar-item" data-tab="chats"><i data-lucide="message-circle-more"></i><span>Чаты</span></div>
            <div class="bar-item" data-tab="center" id="center-button"><i data-lucide="circle-user"></i><span>Центр</span></div>
            <div class="bar-item" data-tab="games"><i data-lucide="layout-grid"></i><span>Игры</span></div>
            <div class="bar-item" data-tab="settings"><i data-lucide="menu"></i><span>Меню</span></div>
        </div>
    </div>

    <!-- BOTTOM SHEET -->
    <div class="sheet-overlay" id="sheet-overlay">
        <div class="sheet">
            <div class="sheet-item" id="create-character"><i data-lucide="user-plus"></i> Создать персонажа</div>
            <div class="sheet-item" id="create-group"><i data-lucide="users"></i> Новая группа</div>
        </div>
    </div>

    <!-- Лоадер -->
    <div class="loader-overlay" id="loader">
        <div class="loader-content">
            <div class="loader-text">ПРОБУЖДЕНИЕ</div>
            <div class="loader-sub">связь с нейросетью...</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // Инициализация иконок Lucide
            lucide.createIcons();

            // Элементы
            const splash = document.getElementById('splash-screen');
            const progressFill = document.getElementById('progress-fill');
            const mainContent = document.getElementById('main-content');
            const contentArea = document.getElementById('content-area');
            const fileInput = document.getElementById('file-input');
            const loader = document.getElementById('loader');
            const splashPlaceholder = document.getElementById('splash-placeholder');
            const splashImage = document.getElementById('splash-image');
            const sheetOverlay = document.getElementById('sheet-overlay');
            const createCharacterBtn = document.getElementById('create-character');
            const createGroupBtn = document.getElementById('create-group');
            const centerButton = document.getElementById('center-button');

            // Анимация сплэша
            setTimeout(() => progressFill.style.width = '100%', 100);
            setTimeout(() => {
                splash.classList.add('hidden');
                mainContent.classList.add('visible');
                tg.HapticFeedback?.impactOccurred('medium');
            }, 3200);

            // Данные персонажа
            let character = {
                name: '',
                gender: 'male',
                greeting: '',
                story: '',
                photo: localStorage.getItem('characterPhoto') || null,
                hunger: 80,
                energy: 70,
                happiness: 90
            };
            const saved = localStorage.getItem('neuroCharacter');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    character = { ...character, ...parsed };
                } catch (e) {}
            }
            function saveCharacter() {
                localStorage.setItem('neuroCharacter', JSON.stringify(character));
            }

            // Загрузка фото
            function updatePhoto(dataUrl) {
                character.photo = dataUrl;
                localStorage.setItem('characterPhoto', dataUrl);
                splashPlaceholder.style.display = 'none';
                splashImage.src = dataUrl;
                splashImage.style.display = 'block';
                saveCharacter();
            }
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => updatePhoto(event.target.result);
                reader.readAsDataURL(file);
            });

            // Рендер главной (конструктор)
            function renderHome() {
                let photoHtml = character.photo
                    ? `<img src="${character.photo}" alt="">`
                    : '<span class="avatar-placeholder">🧬</span>';

                const html = `
                    <div class="neuro-header"><h1>NEURO BRO</h1></div>
                    <div class="avatar-block">
                        <div class="avatar-circle" id="avatar-circle">${photoHtml}</div>
                        <div class="avatar-label" id="upload-label">[ ОБРАЗ ]</div>
                    </div>
                    <div class="stats">
                        <div class="stat-item"><span class="stat-icon">🍽️</span><div class="stat-bar"><div class="stat-fill" style="width: ${character.hunger}%;"></div></div><span class="stat-value">${character.hunger}%</span></div>
                        <div class="stat-item"><span class="stat-icon">⚡</span><div class="stat-bar"><div class="stat-fill" style="width: ${character.energy}%;"></div></div><span class="stat-value">${character.energy}%</span></div>
                        <div class="stat-item"><span class="stat-icon">🤍</span><div class="stat-bar"><div class="stat-fill" style="width: ${character.happiness}%;"></div></div><span class="stat-value">${character.happiness}%</span></div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ИМЯ ]</div>
                        <input type="text" class="input-field" id="nameInput" value="${character.name || ''}" maxlength="30">
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ПОЛ ]</div>
                        <div class="gender-chips" id="genderChips">
                            <div class="chip ${character.gender === 'male' ? 'active' : ''}" data-gender="male">М</div>
                            <div class="chip ${character.gender === 'female' ? 'active' : ''}" data-gender="female">Ж</div>
                            <div class="chip ${character.gender === 'other' ? 'active' : ''}" data-gender="other">⚥</div>
                        </div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ГОЛОС ]</div>
                        <input type="text" class="input-field" id="greetingInput" value="${character.greeting || ''}" maxlength="100">
                        <div class="char-counter" id="greetingCounter">${character.greeting?.length || 0}/100</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ИСТОРИЯ ]</div>
                        <input type="text" class="input-field" id="storyInput" value="${character.story || ''}" maxlength="200">
                        <div class="char-counter" id="storyCounter">${character.story?.length || 0}/200</div>
                    </div>
                    <div class="action-grid">
                        <div class="action-btn" id="action-feed"><span>🍖</span> Покормить</div>
                        <div class="action-btn" id="action-sleep"><span>🛌</span> Спать</div>
                        <div class="action-btn" id="action-walk"><span>🚶</span> Гулять</div>
                        <div class="action-btn" id="action-play"><span>🎮</span> Играть</div>
                    </div>
                    <div class="main-buttons">
                        <button class="btn btn-outline" id="resetBtn">СБРОС</button>
                        <button class="btn btn-primary" id="activateBtn">ПРОБУДИТЬ</button>
                    </div>
                `;
                contentArea.innerHTML = html;

                // Привязка событий
                document.getElementById('avatar-circle')?.addEventListener('click', () => fileInput.click());
                document.getElementById('upload-label')?.addEventListener('click', () => fileInput.click());

                const nameInput = document.getElementById('nameInput');
                const greetingInput = document.getElementById('greetingInput');
                const storyInput = document.getElementById('storyInput');
                const genderChips = document.querySelectorAll('.chip');
                const resetBtn = document.getElementById('resetBtn');
                const activateBtn = document.getElementById('activateBtn');

                nameInput?.addEventListener('input', (e) => { character.name = e.target.value; saveCharacter(); });
                greetingInput?.addEventListener('input', (e) => { character.greeting = e.target.value; saveCharacter(); updateCounters(); });
                storyInput?.addEventListener('input', (e) => { character.story = e.target.value; saveCharacter(); updateCounters(); });

                function updateCounters() {
                    const gc = document.getElementById('greetingCounter');
                    const sc = document.getElementById('storyCounter');
                    if(gc) gc.textContent = `${greetingInput.value.length}/100`;
                    if(sc) sc.textContent = `${storyInput.value.length}/200`;
                }

                genderChips.forEach(chip => {
                    chip.addEventListener('click', function() {
                        genderChips.forEach(c => c.classList.remove('active'));
                        this.classList.add('active');
                        character.gender = this.dataset.gender;
                        saveCharacter();
                    });
                });

                function modifyStat(stat, delta) {
                    if (stat === 'hunger') character.hunger = Math.min(100, Math.max(0, (character.hunger || 50) + delta));
                    if (stat === 'energy') character.energy = Math.min(100, Math.max(0, (character.energy || 50) + delta));
                    if (stat === 'happiness') character.happiness = Math.min(100, Math.max(0, (character.happiness || 50) + delta));
                    saveCharacter();
                    renderHome();
                    tg.HapticFeedback?.impactOccurred('light');
                }

                document.getElementById('action-feed')?.addEventListener('click', () => modifyStat('hunger', 10));
                document.getElementById('action-sleep')?.addEventListener('click', () => modifyStat('energy', 15));
                document.getElementById('action-walk')?.addEventListener('click', () => modifyStat('happiness', 12));
                document.getElementById('action-play')?.addEventListener('click', () => {
                    modifyStat('happiness', 8);
                    modifyStat('energy', -3);
                });

                resetBtn?.addEventListener('click', () => {
                    character = {
                        name: '', gender: 'male', greeting: '', story: '',
                        photo: character.photo,
                        hunger: 80, energy: 70, happiness: 90
                    };
                    saveCharacter();
                    renderHome();
                    tg.HapticFeedback?.impactOccurred('light');
                });

                activateBtn?.addEventListener('click', () => {
                    loader.classList.add('show');
                    tg.HapticFeedback?.impactOccurred('medium');
                    setTimeout(() => {
                        loader.classList.remove('show');
                        console.log('Персонаж:', character);
                        tg.showAlert('Данные в консоли');
                    }, 1500);
                });
            }

            // Рендер страниц-заглушек
            function renderFeed() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="globe" style="width:48px; height:48px; margin-bottom:20px;"></i><br>ЛЕНТА ПЕРСОНАЖЕЙ<br>скоро здесь будут карточки других игроков</div>';
                lucide.createIcons();
            }
            function renderChats() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="message-circle-more" style="width:48px; height:48px; margin-bottom:20px;"></i><br>ДИАЛОГИ<br>список активных чатов с персонажами</div>';
                lucide.createIcons();
            }
            function renderGames() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="layout-grid" style="width:48px; height:48px; margin-bottom:20px;"></i><br>МИНИ-ИГРЫ<br>скоро здесь появятся активности</div>';
                lucide.createIcons();
            }
            function renderSettings() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="menu" style="width:48px; height:48px; margin-bottom:20px;"></i><br>НАСТРОЙКИ<br>профиль, уведомления, тема</div>';
                lucide.createIcons();
            }

            // Переключение вкладок
            const barItems = document.querySelectorAll('.bar-item');
            barItems.forEach(item => {
                item.addEventListener('click', () => {
                    const tab = item.dataset.tab;
                    if (tab === 'center') {
                        sheetOverlay.classList.add('show');
                        tg.HapticFeedback?.impactOccurred('medium');
                        return;
                    }
                    sheetOverlay.classList.remove('show');
                    barItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    switch(tab) {
                        case 'feed': renderFeed(); break;
                        case 'chats': renderChats(); break;
                        case 'games': renderGames(); break;
                        case 'settings': renderSettings(); break;
                    }
                    tg.HapticFeedback?.impactOccurred('light');
                });
            });

            // Обработка Bottom Sheet
            createCharacterBtn.addEventListener('click', () => {
                sheetOverlay.classList.remove('show');
                barItems.forEach(i => i.classList.remove('active'));
                renderHome();
                tg.HapticFeedback?.impactOccurred('medium');
            });
            createGroupBtn.addEventListener('click', () => {
                sheetOverlay.classList.remove('show');
                alert('Создание группы — будет позже');
                tg.HapticFeedback?.impactOccurred('medium');
            });
            sheetOverlay.addEventListener('click', (e) => {
                if (e.target === sheetOverlay) {
                    sheetOverlay.classList.remove('show');
                }
            });

            // Стартовая страница — лента
            renderFeed();
            document.querySelector('.bar-item[data-tab="feed"]').classList.add('active');

            // Восстанавливаем фото в сплэше
            if (character.photo) {
                splashPlaceholder.style.display = 'none';
                splashImage.src = character.photo;
                splashImage.style.display = 'block';
            }
        })();
    </script>
</body>
</html>
