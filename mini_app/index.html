<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Нейро Тян · конструктор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* сплэш */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease-out;
            pointer-events: all;
        }
        #splash-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .splash-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #111111;
            border: 3px solid #9c27b0;
            box-shadow: 0 0 30px #9c27b0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .splash-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .splash-avatar span {
            font-size: 56px;
            filter: drop-shadow(0 0 10px #ce93ff);
        }
        .splash-name {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #e0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .splash-quote {
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #b388ff;
            margin-bottom: 30px;
            text-shadow: 0 0 8px #9c27b0;
        }
        .progress-container {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #9c27b0, #ce93ff);
            box-shadow: 0 0 15px #9c27b0;
            transition: width 3s linear;
        }
        /* основной контент */
        #main-content {
            opacity: 0;
            transition: opacity 0.5s ease-in;
            padding: 20px;
            max-width: 420px;
            margin: 0 auto;
        }
        #main-content.visible {
            opacity: 1;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #d4b0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px 0;
        }
        .avatar-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1A1A1A;
            border: 2px solid rgba(156, 39, 176, 0.5);
            box-shadow: 0 0 20px rgba(156, 39, 176, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .avatar-placeholder {
            font-size: 36px;
        }
        .avatar-label {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: #b388ff;
            background: rgba(156, 39, 176, 0.15);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(156, 39, 176, 0.3);
            cursor: pointer;
        }
        .row-fields {
            display: flex;
            gap: 12px;
        }
        .row-fields .card {
            flex: 1;
            background: rgba(20, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(156, 39, 176, 0.3);
            border-radius: 24px;
            padding: 18px 16px;
        }
        .card-label {
            font-size: 12px;
            font-weight: 600;
            color: #b388ff;
            margin-bottom: 12px;
        }
        input, textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            color: #fff;
        }
        .gender-chips {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        .chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(156, 39, 176, 0.4);
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 15px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            flex: 1;
            text-align: center;
        }
        .chip.active {
            background: #9c27b0;
            color: #fff;
            box-shadow: 0 0 15px #9c27b0;
        }
        .char-counter {
            text-align: right;
            font-size: 11px;
            color: #b388ff;
            margin-top: 6px;
        }
        .legend textarea {
            min-height: 90px;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        .btn {
            flex: 1;
            padding: 18px 0;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #9c27b0;
            color: #b388ff;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
            color: white;
            box-shadow: 0 4px 20px rgba(156, 39, 176, 0.5);
        }
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .loader-overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .loader-content {
            background: #1a1a2a;
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 60px #9c27b0;
        }
        .loader-text {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #e0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loader-sub {
            color: #b388ff;
            margin-top: 12px;
        }
        /* скрытый input для выбора файла */
        #file-input {
            display: none;
        }
    </style>
</head>
<body>
    <input type="file" id="file-input" accept="image/*">

    <div id="splash-screen">
        <div class="splash-avatar" id="splash-avatar">
            <span id="splash-placeholder">🧬</span>
            <img id="splash-image" src="#" alt="" style="display: none;">
        </div>
        <div class="splash-name">НЕЙРО ТЯН</div>
        <div class="splash-quote">СИНХРОНИЗАЦИЯ С СОЗНАНИЕМ...</div>
        <div class="progress-container">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="main-content">
        <div class="container">
            <div class="title">⛓️ СОЗДАЙ ДНК</div>
            <div class="avatar-section">
                <div class="avatar-circle" id="avatar-circle">
                    <span class="avatar-placeholder" id="avatar-placeholder">🧬</span>
                    <img id="avatar-image" src="#" alt="" style="display: none;">
                </div>
                <div class="avatar-label" id="upload-label">ЗАГРУЗИТЬ ДНК ПЕРСОНАЖА</div>
            </div>

            <div class="row-fields">
                <div class="card">
                    <div class="card-label">ИМЯ</div>
                    <input type="text" id="nameInput" placeholder="например: Нейромант" maxlength="30">
                </div>
                <div class="card">
                    <div class="card-label">ПОЛ</div>
                    <div class="gender-chips" id="genderChips">
                        <div class="chip" data-gender="male">♂ М</div>
                        <div class="chip" data-gender="female">♀ Ж</div>
                        <div class="chip" data-gender="other">⚥</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-label">🧠 ПРОШИВКА ЛИЧНОСТИ <span style="background:#9c27b0; color:#000; padding:2px 8px; border-radius:30px; font-size:10px;">приветствие</span></div>
                <input type="text" id="greetingInput" placeholder="Первая фраза твоего героя..." maxlength="100">
                <div class="char-counter" id="greetingCounter">0/100</div>
            </div>

            <div class="card legend">
                <div class="card-label">📜 ЛЕГЕНДА</div>
                <textarea id="legendInput" placeholder="Глубокая история, характер, мотивы..." rows="4" maxlength="500"></textarea>
                <div class="char-counter" id="legendCounter">0/500</div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-outline" id="resetBtn">СБРОС</button>
                <button class="btn btn-gradient" id="activateBtn">АКТИВИРОВАТЬ</button>
            </div>
        </div>
    </div>

    <div class="loader-overlay" id="loader">
        <div class="loader-content">
            <div class="loader-text">СИНХРОНИЗАЦИЯ</div>
            <div class="loader-sub">с нейросетью Dolphin 24B ...</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            // Элементы
            const splash = document.getElementById('splash-screen');
            const progressFill = document.getElementById('progress-fill');
            const mainContent = document.getElementById('main-content');
            const fileInput = document.getElementById('file-input');
            const avatarCircle = document.getElementById('avatar-circle');
            const avatarPlaceholder = document.getElementById('avatar-placeholder');
            const avatarImage = document.getElementById('avatar-image');
            const splashAvatar = document.getElementById('splash-avatar');
            const splashPlaceholder = document.getElementById('splash-placeholder');
            const splashImage = document.getElementById('splash-image');
            const uploadLabel = document.getElementById('upload-label');

            // Поля
            const nameInput = document.getElementById('nameInput');
            const greetingInput = document.getElementById('greetingInput');
            const legendInput = document.getElementById('legendInput');
            const greetingCounter = document.getElementById('greetingCounter');
            const legendCounter = document.getElementById('legendCounter');
            const genderChips = document.querySelectorAll('.chip');
            const resetBtn = document.getElementById('resetBtn');
            const activateBtn = document.getElementById('activateBtn');
            const loader = document.getElementById('loader');

            let activeGender = 'male';

            // Инициализация пола
            genderChips.forEach(chip => {
                chip.addEventListener('click', function() {
                    genderChips.forEach(c => c.classList.remove('active'));
                    this.classList.add('active');
                    activeGender = this.dataset.gender;
                });
            });
            document.querySelector('.chip[data-gender="male"]').classList.add('active');

            // Счётчики
            function updateCounters() {
                greetingCounter.textContent = `${greetingInput.value.length}/100`;
                legendCounter.textContent = `${legendInput.value.length}/500`;
            }
            greetingInput.addEventListener('input', updateCounters);
            legendInput.addEventListener('input', updateCounters);
            updateCounters();

            // Загрузка фото
            function handleImage(file) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const dataUrl = e.target.result;
                    // Показываем в конструкторе
                    avatarPlaceholder.style.display = 'none';
                    avatarImage.src = dataUrl;
                    avatarImage.style.display = 'block';
                    // Показываем в сплэше
                    splashPlaceholder.style.display = 'none';
                    splashImage.src = dataUrl;
                    splashImage.style.display = 'block';
                    // Сохраняем в localStorage (или tg, но пока так)
                    localStorage.setItem('characterPhoto', dataUrl);
                };
                reader.readAsDataURL(file);
            }

            // Клик по аватарке или надписи
            avatarCircle.addEventListener('click', () => fileInput.click());
            uploadLabel.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) handleImage(file);
            });

            // Восстановление фото из localStorage (если есть)
            const savedPhoto = localStorage.getItem('characterPhoto');
            if (savedPhoto) {
                avatarPlaceholder.style.display = 'none';
                avatarImage.src = savedPhoto;
                avatarImage.style.display = 'block';
                splashPlaceholder.style.display = 'none';
                splashImage.src = savedPhoto;
                splashImage.style.display = 'block';
            }

            // Сброс
            resetBtn.addEventListener('click', function() {
                nameInput.value = '';
                greetingInput.value = '';
                legendInput.value = '';
                genderChips.forEach(c => c.classList.remove('active'));
                document.querySelector('.chip[data-gender="male"]').classList.add('active');
                activeGender = 'male';
                updateCounters();
                // Сброс фото
                localStorage.removeItem('characterPhoto');
                avatarImage.style.display = 'none';
                avatarPlaceholder.style.display = 'block';
                splashImage.style.display = 'none';
                splashPlaceholder.style.display = 'block';
                fileInput.value = '';
                tg.HapticFeedback?.impactOccurred('light');
            });

            // Активация (имитация)
            activateBtn.addEventListener('click', function() {
                const characterData = {
                    name: nameInput.value.trim() || 'Безымянный',
                    gender: activeGender,
                    greeting: greetingInput.value.trim() || 'Привет...',
                    legend: legendInput.value.trim() || 'Нет легенды',
                    photo: localStorage.getItem('characterPhoto') || null
                };
                loader.classList.add('show');
                tg.HapticFeedback?.impactOccurred('medium');
                setTimeout(() => {
                    loader.classList.remove('show');
                    console.log('Активирован:', characterData);
                    // tg.sendData(JSON.stringify(characterData));
                    tg.HapticFeedback?.notificationOccurred('success');
                    tg.showAlert(`Персонаж "${characterData.name}" готов. Фото сохранилось локально.`);
                }, 2000);
            });

            // Сплэш анимация
            setTimeout(() => {
                progressFill.style.width = '100%';
            }, 100);
            setTimeout(() => {
                splash.classList.add('hidden');
                mainContent.classList.add('visible');
                tg.HapticFeedback?.impactOccurred('medium');
            }, 3200);
        })();
    </script>
</body>
</html>
