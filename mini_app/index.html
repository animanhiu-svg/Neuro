<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroBro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: system-ui;
            padding: 20px;
        }
        .message {
            background: #2a2a2a;
            border-radius: 18px;
            padding: 8px 12px;
            margin-bottom: 8px;
            max-width: 80%;
        }
        .user {
            background: #2481cc;
            margin-left: auto;
            text-align: right;
        }
        .input-area {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
        }
        button {
            padding: 10px 16px;
            border-radius: 20px;
            border: none;
            background: white;
        }
        #chat {
            margin-bottom: 80px;
        }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="Написать...">
        <button id="send">→</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const chatId = tg.initDataUnsafe.user?.id || 7015403070;
        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.innerText = text;
            chatDiv.appendChild(userDiv);

            input.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, message: text })
                });
                const data = await response.json();
                const botDiv = document.createElement('div');
                botDiv.className = 'message';
                botDiv.innerText = data.reply || '...';
                chatDiv.appendChild(botDiv);
            } catch(e) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message';
                errorDiv.innerText = '⚠️ Ошибка связи';
                chatDiv.appendChild(errorDiv);
            }
        }

        sendBtn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
    </script>
</body>
</html>
