<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroBro · упрощённый</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Inter',sans-serif; background:#121212; color:#fff; }
        #splash-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:#121212; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; opacity:1; transition:opacity 0.5s; }
        #splash-screen.hidden { opacity:0; pointer-events:none; }
        .splash-avatar { width:100px; height:100px; border-radius:50%; background:#1e1e1e; border:2px solid #fff; display:flex; align-items:center; justify-content:center; margin-bottom:24px; overflow:hidden; }
        .splash-avatar span { font-size:48px; }
        .splash-name { font-size:32px; font-weight:600; margin-bottom:16px; }
        .splash-quote { font-size:12px; color:#aaa; margin-bottom:30px; letter-spacing:4px; }
        .progress-container { width:200px; height:2px; background:#333; }
        .progress-fill { height:100%; width:0%; background:#fff; transition:width 3s linear; }
        #main-content { opacity:0; transition:opacity 0.5s; display:flex; flex-direction:column; height:100vh; }
        #main-content.visible { opacity:1; }
        .content-area { flex:1; overflow-y:auto; padding:20px 16px; max-width:420px; margin:0 auto; width:100%; }
        .bottom-bar { display:flex; justify-content:space-around; background:#000; padding:8px 0 12px; position:relative; }
        .bottom-bar::before { content:""; position:absolute; top:0; left:50%; transform:translateX(-50%); width:70%; height:1px; background:linear-gradient(to right, transparent, rgba(255,255,255,0.8), transparent); }
        .bar-item { display:flex; flex-direction:column; align-items:center; color:#fff; font-size:10px; opacity:0.7; transition:transform 0.1s; cursor:pointer; flex:1; }
        .bar-item.active { opacity:1; }
        .bar-item:active { transform:scale(0.92); }
        .bar-item i { width:24px; height:24px; margin-bottom:4px; stroke-width:1.5; }
        .placeholder-page { text-align:center; padding:60px 20px; color:#aaa; }
        .character-card { background:#1a1a1a; border-radius:24px; padding:12px; margin-bottom:12px; display:flex; gap:12px; border:1px solid #2a2a2a; cursor:pointer; }
        .card-avatar { width:60px; height:60px; border-radius:50%; background-size:cover; background-position:center; background-color:#333; flex-shrink:0; }
        .card-name { font-size:18px; font-weight:600; }
        .card-desc { font-size:12px; color:#aaa; margin-top:4px; }
        .chat-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid #333; }
        .chat-back { background:transparent; border:none; color:#fff; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:14px; padding:6px 12px; border-radius:30px; }
        .chat-avatar { width:40px; height:40px; border-radius:50%; background-size:cover; }
        .chat-name { font-size:18px; font-weight:600; }
        .messages { flex:1; display:flex; flex-direction:column; gap:12px; margin-bottom:20px; overflow-y:auto; max-height:60vh; }
        .message { display:flex; flex-direction:column; max-width:80%; }
        .message.user { align-self:flex-end; align-items:flex-end; }
        .message.bot { align-self:flex-start; align-items:flex-start; }
        .message-bubble { background:#2a2a2a; padding:8px 12px; border-radius:18px; font-size:14px; word-break:break-word; }
        .message.user .message-bubble { background:#2481cc; color:#fff; }
        .message-time { font-size:10px; color:#888; margin-top:4px; }
        .chat-input-container { display:flex; gap:10px; margin-top:auto; background:#1e1e1e; border-radius:30px; padding:8px 12px; border:1px solid #333; }
        .chat-input { flex:1; background:transparent; border:none; outline:none; color:#fff; font-size:14px; }
        .chat-send { background:transparent; border:none; color:#fff; cursor:pointer; padding:6px; display:flex; align-items:center; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <div class="splash-avatar"><span>🧬</span></div>
        <div class="splash-name">NEURO BRO</div>
        <div class="splash-quote">ТИШИНА В ЧЕРНО-БЕЛОМ</div>
        <div class="progress-container"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div id="main-content">
        <div class="content-area" id="content-area"></div>
        <div class="bottom-bar">
            <div class="bar-item" data-tab="feed"><i data-lucide="globe"></i><span>Портал</span></div>
            <div class="bar-item" data-tab="chats"><i data-lucide="message-circle-more"></i><span>Чаты</span></div>
            <div class="bar-item" data-tab="center"><i data-lucide="circle-user"></i><span>Центр</span></div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = Telegram.WebApp;
        tg.ready(); tg.expand();

        const chatId = tg.initDataUnsafe.user?.id || 0;
        const API_BASE = 'https://neuro-12pd.onrender.com';

        let currentChat = null;

        // Данные для портала
        const demoCharacters = [
            { name: "Айко", desc: "Кибер-воин", avatar: "https://i.pravatar.cc/150?img=1" },
            { name: "Нейро", desc: "Хакер", avatar: "https://i.pravatar.cc/150?img=2" },
            { name: "Сакура", desc: "Целительница", avatar: "https://i.pravatar.cc/150?img=3" }
        ];

        function renderFeed() {
            const html = `<div style="margin-bottom:24px"><h2>Портал</h2><p>Найди героя</p></div>
                         <div id="charList"></div>`;
            contentArea.innerHTML = html;
            const charList = document.getElementById('charList');
            charList.innerHTML = demoCharacters.map(c => `
                <div class="character-card" data-name="${c.name}" data-avatar="${c.avatar}">
                    <div class="card-avatar" style="background-image:url('${c.avatar}')"></div>
                    <div><div class="card-name">${c.name}</div><div class="card-desc">${c.desc}</div></div>
                </div>
            `).join('');
            document.querySelectorAll('.character-card').forEach(card => {
                card.addEventListener('click', () => {
                    const name = card.dataset.name;
                    const avatar = card.dataset.avatar;
                    renderChat(name, avatar);
                });
            });
        }

        function renderChat(chatName, chatAvatar) {
            const storageKey = `chat_${chatName}`;
            let messages = [];
            try { messages = JSON.parse(localStorage.getItem(storageKey)) || []; } catch(e) {}
            currentChat = chatName;

            const html = `
                <div class="chat-header">
                    <button class="chat-back" id="chat-back"><i data-lucide="arrow-left"></i> Назад</button>
                    <div class="chat-avatar" style="background-image: url('${chatAvatar}');"></div>
                    <div class="chat-name">${escapeHtml(chatName)}</div>
                </div>
                <div class="messages" id="chat-messages">
                    ${messages.map(msg => `
                        <div class="message ${msg.sender}">
                            <div class="message-bubble">${escapeHtml(msg.text)}</div>
                            <div class="message-time">${msg.time}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="chat-input-container">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Написать...">
                    <button class="chat-send" id="chat-send"><i data-lucide="send"></i></button>
                </div>
            `;
            contentArea.innerHTML = html;
            lucide.createIcons();

            const messagesContainer = document.getElementById('chat-messages');
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('chat-send');
            const backBtn = document.getElementById('chat-back');

            function scrollToBottom() {
                if (messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            scrollToBottom();

            function addMessage(text, sender) {
                const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                messages.push({ text, sender, time });
                localStorage.setItem(storageKey, JSON.stringify(messages));
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${sender}`;
                msgDiv.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
                messagesContainer.appendChild(msgDiv);
                scrollToBottom();
            }

            async function sendMessage() {
                const text = input.value.trim();
                if (!text) return;
                addMessage(text, 'user');
                input.value = '';
                try {
                    const response = await fetch(`${API_BASE}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: chatId, message: text })
                    });
                    const data = await response.json();
                    if (data.reply) addMessage(data.reply, 'bot');
                    else addMessage('Ошибка: пустой ответ', 'bot');
                } catch (err) {
                    console.error(err);
                    addMessage('Ошибка соединения', 'bot');
                }
            }

            sendBtn.addEventListener('click', sendMessage);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            backBtn.addEventListener('click', () => {
                currentChat = null;
                renderFeed();
            });
        }

        function renderChats() {
            contentArea.innerHTML = '<div class="placeholder-page">Список чатов (пока пуст)</div>';
        }

        function renderCenter() {
            contentArea.innerHTML = '<div class="placeholder-page">Центр (конструктор позже)</div>';
        }

        const contentArea = document.getElementById('content-area');
        const barItems = document.querySelectorAll('.bar-item');

        barItems.forEach(item => {
            item.addEventListener('click', () => {
                barItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                const tab = item.dataset.tab;
                if (tab === 'feed') renderFeed();
                else if (tab === 'chats') renderChats();
                else if (tab === 'center') renderCenter();
                tg.HapticFeedback?.impactOccurred('light');
            });
        });

        const splash = document.getElementById('splash-screen');
        const progressFill = document.getElementById('progress-fill');
        setTimeout(() => progressFill.style.width = '100%', 100);
        setTimeout(() => {
            splash.classList.add('hidden');
            document.getElementById('main-content').classList.add('visible');
            tg.HapticFeedback?.impactOccurred('medium');
        }, 3200);

        renderFeed();
        barItems[0].classList.add('active');

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
        }
    </script>
</body>
</html>
