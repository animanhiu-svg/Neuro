<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroBro · портал</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <style>
        /* все стили из последней стабильной версии (они уже есть) */
        /* добавляем стили для иконки фотоаппарата в круге */
        .avatar-circle .camera-icon {
            width: 48px;
            height: 48px;
            color: #aaa;
        }
        .avatar-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <input type="file" id="file-input" accept="image/*">

    <div id="splash-screen">
        <div class="splash-avatar"><span>🧬</span></div>
        <div class="splash-name">NEURO BRO</div>
        <div class="splash-quote">ТИШИНА В ЧЕРНО-БЕЛОМ</div>
        <div class="progress-container"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div id="main-content">
        <div class="content-area" id="content-area"></div>
        <div class="bottom-bar">
            <div class="bar-item" data-tab="feed"><i data-lucide="globe"></i><span>Портал</span></div>
            <div class="bar-item" data-tab="chats"><i data-lucide="message-circle-more"></i><span>Чаты</span></div>
            <div class="bar-item" data-tab="center"><i data-lucide="circle-user"></i><span>Центр</span></div>
            <div class="bar-item" data-tab="games"><i data-lucide="layout-grid"></i><span>Игры</span></div>
            <div class="bar-item" data-tab="profile"><i data-lucide="menu"></i><span>Профиль</span></div>
        </div>
    </div>

    <div class="crop-modal" id="crop-modal">
        <div class="crop-container">
            <img src="" id="crop-image" class="crop-image">
        </div>
        <div class="crop-controls">
            <button class="crop-btn" id="crop-cancel">Отмена</button>
            <button class="crop-btn primary" id="crop-apply">Готово</button>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.ready(); tg.expand();

            const user_id = tg.initDataUnsafe.user?.id;
            const chat_id = (user_id && user_id !== 0) ? user_id : 7015403070;

            // ---------- Список персонажей ----------
            let characters = [];
            try {
                const saved = localStorage.getItem('characters');
                if (saved) characters = JSON.parse(saved);
            } catch(e) {}

            function saveCharacters() {
                localStorage.setItem('characters', JSON.stringify(characters));
            }

            // ---------- Временные данные для конструктора (пока не сохранён) ----------
            let tempCharacter = {
                id: null,
                name: '',
                gender: 'male',
                greeting: '',
                appearance: '',
                personality: '',
                scenario: '',
                memory: '',
                tags: '',
                photo: null
            };

            // ---------- Кадрирование ----------
            let pendingCharacterId = null;
            let pendingFile = null;
            let cropper = null;
            const cropModal = document.getElementById('crop-modal');
            const cropImage = document.getElementById('crop-image');
            const cropCancel = document.getElementById('crop-cancel');
            const cropApply = document.getElementById('crop-apply');

            function openCrop(file, charId) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    cropImage.src = e.target.result;
                    cropModal.classList.add('show');
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(cropImage, {
                        aspectRatio: 1,
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 1,
                        cropBoxMovable: false,
                        cropBoxResizable: false,
                        toggleDragModeOnDblclick: false,
                        background: false,
                        modal: false,
                        guides: false,
                        center: false,
                        highlight: false
                    });
                    pendingFile = file;
                    pendingCharacterId = charId;
                };
                reader.readAsDataURL(file);
            }

            cropCancel.addEventListener('click', () => {
                cropModal.classList.remove('show');
                if (cropper) cropper.destroy();
                pendingFile = null;
                pendingCharacterId = null;
            });

            cropApply.addEventListener('click', () => {
                if (!cropper || !pendingFile || pendingCharacterId === null) return;
                const canvas = cropper.getCroppedCanvas({ width: 300, height: 300, imageSmoothingQuality: 'high' });
                const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.9);
                // Обновляем фото в нужном месте
                if (pendingCharacterId === 'temp') {
                    tempCharacter.photo = croppedDataUrl;
                } else {
                    const charIndex = characters.findIndex(c => c.id === pendingCharacterId);
                    if (charIndex !== -1) {
                        characters[charIndex].photo = croppedDataUrl;
                        saveCharacters();
                    }
                }
                cropModal.classList.remove('show');
                cropper.destroy();
                pendingFile = null;
                pendingCharacterId = null;
                // Перерисовываем конструктор
                renderCenter(pendingCharacterId === 'temp' ? null : pendingCharacterId);
            });

            // ---------- Чат ----------
            function addMessageToUI(container, text, sender, time, avatarUrl) {
                const div = document.createElement('div');
                div.className = `message ${sender}`;
                if (sender === 'user') {
                    div.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div><div class="message-time">${time}</div>`;
                } else {
                    div.innerHTML = `
                        <div class="message-avatar" style="background-image: url('${avatarUrl || "https://i.pravatar.cc/150?img=0"}');"></div>
                        <div class="message-content">
                            <div class="message-bubble">${escapeHtml(text)}</div>
                            <div class="message-time">${time}</div>
                        </div>
                    `;
                }
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }

            async function sendMessageToServer(character, text, messagesContainer, storageKey, onReply) {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message bot';
                typingDiv.innerHTML = '<div class="typing-indicator">✎ печатает...</div>';
                messagesContainer.appendChild(typingDiv);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                const payload = {
                    chat_id: chat_id,
                    message: text,
                    character: character
                };
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000);
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    const data = await response.json();
                    const replyText = data.reply || '⚠️ Пустой ответ от сервера';
                    typingDiv.remove();
                    const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                    addMessageToUI(messagesContainer, replyText, 'bot', time, character.photo);
                    let messages = [];
                    try { messages = JSON.parse(localStorage.getItem(storageKey)) || []; } catch(e) {}
                    messages.push({ text: replyText, sender: 'bot', time, avatar: character.photo });
                    localStorage.setItem(storageKey, JSON.stringify(messages));
                    if (onReply) onReply(replyText);
                } catch (err) {
                    console.error(err);
                    typingDiv.remove();
                    const errorText = err.name === 'AbortError' ? '⚠️ Сервер не отвечает (таймаут)' : '⚠️ Ошибка соединения с сервером';
                    addMessageToUI(messagesContainer, errorText, 'bot', new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }), character.photo);
                }
            }

            function renderChat(character) {
                const storageKey = `chat_${character.id}`;
                let messages = [];
                try { messages = JSON.parse(localStorage.getItem(storageKey)) || []; } catch(e) {}

                const html = `
                    <div class="chat-header">
                        <button class="chat-back" id="chat-back"><i data-lucide="arrow-left"></i> Назад</button>
                        <div class="chat-avatar" style="background-image: url('${character.photo || "https://i.pravatar.cc/150?img=0"}');"></div>
                        <div class="chat-name">${escapeHtml(character.name)}</div>
                    </div>
                    <div class="messages" id="chat-messages"></div>
                    <div class="chat-input-container">
                        <input type="text" class="chat-input" id="chat-input" placeholder="Написать...">
                        <button class="chat-send" id="chat-send"><i data-lucide="send"></i></button>
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();

                const messagesContainer = document.getElementById('chat-messages');
                const input = document.getElementById('chat-input');
                const sendBtn = document.getElementById('chat-send');
                const backBtn = document.getElementById('chat-back');

                messages.forEach(msg => {
                    addMessageToUI(messagesContainer, msg.text, msg.sender, msg.time, msg.avatar || character.photo);
                });

                function addUserMessage(text) {
                    const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
                    addMessageToUI(messagesContainer, text, 'user', time);
                    messages.push({ text, sender: 'user', time });
                    localStorage.setItem(storageKey, JSON.stringify(messages));
                }

                async function handleSend() {
                    const text = input.value.trim();
                    if (!text) return;
                    addUserMessage(text);
                    input.value = '';
                    await sendMessageToServer(character, text, messagesContainer, storageKey, (reply) => {
                        messages.push({ text: reply, sender: 'bot', time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }), avatar: character.photo });
                        localStorage.setItem(storageKey, JSON.stringify(messages));
                    });
                }

                sendBtn.addEventListener('click', handleSend);
                input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
                backBtn.addEventListener('click', () => renderFeed());
            }

            // ---------- Портал ----------
            function renderFeed() {
                if (characters.length === 0) {
                    contentArea.innerHTML = `
                        <div class="portal-header">
                            <h2>Портал</h2>
                            <p>Создайте своего первого персонажа в центре</p>
                        </div>
                        <div class="empty-state">✨ Здесь будут ваши персонажи</div>
                    `;
                    lucide.createIcons();
                    return;
                }
                const html = `
                    <div class="portal-header">
                        <h2>Портал</h2>
                        <p>Найди своего героя</p>
                    </div>
                    <div class="search-box">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchInput" placeholder="Имя персонажа...">
                    </div>
                    <div id="charactersList" class="characters-list"></div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();

                const searchInput = document.getElementById('searchInput');
                const charactersList = document.getElementById('charactersList');

                function renderCharacters() {
                    const query = searchInput.value.toLowerCase();
                    let filtered = characters.filter(c => c.name.toLowerCase().includes(query));
                    if (filtered.length === 0) {
                        charactersList.innerHTML = '<div class="empty-state">✨ Ничего не найдено</div>';
                        return;
                    }
                    charactersList.innerHTML = filtered.map(c => `
                        <div class="character-card" data-id="${c.id}">
                            <div class="card-avatar" style="background-image: url('${c.photo || "https://i.pravatar.cc/150?img=0"}');"></div>
                            <div class="card-info">
                                <div class="card-name">${escapeHtml(c.name)}</div>
                                <div class="card-greeting">${escapeHtml(c.greeting || '')}</div>
                            </div>
                        </div>
                    `).join('');
                    document.querySelectorAll('.character-card').forEach(card => {
                        card.addEventListener('click', () => {
                            const id = parseInt(card.dataset.id);
                            const character = characters.find(c => c.id === id);
                            if (character) renderChat(character);
                        });
                    });
                }

                searchInput.addEventListener('input', renderCharacters);
                renderCharacters();
            }

            // ---------- Список чатов ----------
            function renderChats() {
                if (characters.length === 0) {
                    contentArea.innerHTML = `
                        <div class="empty-chats">
                            <i data-lucide="message-circle" style="width:48px;height:48px;margin-bottom:16px;"></i>
                            <p>Нет чатов</p>
                            <p style="font-size:12px">Создайте персонажа в центре</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }
                const chats = characters.map(c => {
                    const key = `chat_${c.id}`;
                    let lastMessage = "Нет сообщений";
                    let lastTime = "";
                    try {
                        const msgs = JSON.parse(localStorage.getItem(key)) || [];
                        if (msgs.length > 0) {
                            const last = msgs[msgs.length-1];
                            lastMessage = last.text;
                            lastTime = last.time;
                        }
                    } catch(e) {}
                    return {
                        id: c.id,
                        name: c.name,
                        avatar: c.photo || "https://i.pravatar.cc/150?img=0",
                        lastMessage: lastMessage,
                        lastTime: lastTime
                    };
                });
                const html = `
                    <div class="chats-list">
                        ${chats.map(chat => `
                            <div class="chat-item" data-id="${chat.id}">
                                <div class="chat-item-avatar" style="background-image: url('${chat.avatar}');"></div>
                                <div class="chat-item-info">
                                    <div class="chat-item-name">${escapeHtml(chat.name)}</div>
                                    <div class="chat-item-last">${escapeHtml(chat.lastMessage)}</div>
                                    ${chat.lastTime ? `<div style="font-size:10px; color:#666;">${chat.lastTime}</div>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();
                document.querySelectorAll('.chat-item').forEach(el => {
                    const id = parseInt(el.dataset.id);
                    const character = characters.find(c => c.id === id);
                    if (character) {
                        el.addEventListener('click', () => renderChat(character));
                    }
                });
            }

            // ---------- Конструктор ----------
            let currentEditId = null;

            function renderCenter(editId = null) {
                currentEditId = editId;
                let char = null;
                if (editId !== null) {
                    char = characters.find(c => c.id === editId);
                }
                if (!char) {
                    char = tempCharacter;
                } else {
                    // Если редактируем существующего, копируем его в temp для работы
                    tempCharacter = { ...char };
                }

                const avatarHtml = tempCharacter.photo
                    ? `<div class="avatar-circle" id="avatar-circle" style="background-image: url('${tempCharacter.photo}');"></div>`
                    : `<div class="avatar-circle" id="avatar-circle"><div class="avatar-placeholder"><i data-lucide="camera" class="camera-icon" style="width:48px;height:48px;color:#aaa;"></i></div></div>`;

                const html = `
                    <div class="neuro-header"><h1>${editId ? 'РЕДАКТИРОВАТЬ ПЕРСОНАЖА' : 'СОЗДАТЬ ПЕРСОНАЖА'}</h1></div>
                    <div class="avatar-block">
                        ${avatarHtml}
                        <div class="avatar-label" id="upload-label">[ ЗАГРУЗИТЬ ФОТО ]</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ИМЯ ]</div>
                        <input type="text" class="input-field" id="nameInput" value="${escapeHtml(tempCharacter.name)}" maxlength="30">
                        <div class="hint">Как будут звать вашего персонажа?</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ПОЛ ]</div>
                        <div class="gender-chips" id="genderChips">
                            <div class="chip ${tempCharacter.gender === 'male' ? 'active' : ''}" data-gender="male">М</div>
                            <div class="chip ${tempCharacter.gender === 'female' ? 'active' : ''}" data-gender="female">Ж</div>
                            <div class="chip ${tempCharacter.gender === 'other' ? 'active' : ''}" data-gender="other">⚥</div>
                        </div>
                        <div class="hint">Выберите пол для правильных окончаний в речи</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ПРИВЕТСТВИЕ ]</div>
                        <input type="text" class="input-field" id="greetingInput" value="${escapeHtml(tempCharacter.greeting)}" maxlength="200">
                        <div class="char-counter" id="greetingCounter">${tempCharacter.greeting?.length || 0}/200</div>
                        <div class="hint">Первая фраза, которую скажет персонаж при встрече</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ВНЕШНОСТЬ ]</div>
                        <textarea class="input-textarea" id="appearanceInput" rows="2" maxlength="500">${escapeHtml(tempCharacter.appearance)}</textarea>
                        <div class="char-counter" id="appearanceCounter">${tempCharacter.appearance?.length || 0}/500</div>
                        <div class="hint">Волосы, глаза, рост, одежда, особенности внешности</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ХАРАКТЕР / ЛИЧНОСТЬ ]</div>
                        <textarea class="input-textarea" id="personalityInput" rows="2" maxlength="500">${escapeHtml(tempCharacter.personality)}</textarea>
                        <div class="char-counter" id="personalityCounter">${tempCharacter.personality?.length || 0}/500</div>
                        <div class="hint">Черты характера, привычки, манера речи, ценности</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ СЦЕНАРИЙ ]</div>
                        <textarea class="input-textarea" id="scenarioInput" rows="2" maxlength="500">${escapeHtml(tempCharacter.scenario)}</textarea>
                        <div class="char-counter" id="scenarioCounter">${tempCharacter.scenario?.length || 0}/500</div>
                        <div class="hint">Где находится, что происходит, настроение, обстоятельства</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ПАМЯТЬ ]</div>
                        <textarea class="input-textarea" id="memoryInput" rows="2" maxlength="500">${escapeHtml(tempCharacter.memory)}</textarea>
                        <div class="char-counter" id="memoryCounter">${tempCharacter.memory?.length || 0}/500</div>
                        <div class="hint">Важные факты, ключевые события, отношения, секреты</div>
                    </div>
                    <div class="input-group">
                        <div class="input-label">[ ТЕГИ ]</div>
                        <input type="text" class="input-field" id="tagsInput" value="${escapeHtml(tempCharacter.tags)}" maxlength="100" placeholder="например: киберпанк, магия, детектив">
                        <div class="hint">Ключевые слова для поиска</div>
                    </div>
                    <div class="main-buttons">
                        <button class="btn btn-outline" id="resetBtn">СБРОС</button>
                        <button class="btn btn-primary" id="activateBtn">${editId ? 'СОХРАНИТЬ' : 'СОЗДАТЬ'}</button>
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();

                const fileInput = document.getElementById('file-input');
                const avatarCircle = document.getElementById('avatar-circle');
                const uploadLabel = document.getElementById('upload-label');

                function handleFileSelect() {
                    fileInput.click();
                }
                avatarCircle?.addEventListener('click', handleFileSelect);
                uploadLabel?.addEventListener('click', handleFileSelect);

                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        openCrop(file, 'temp');
                    }
                    fileInput.value = '';
                };

                const nameInput = document.getElementById('nameInput');
                const greetingInput = document.getElementById('greetingInput');
                const appearanceInput = document.getElementById('appearanceInput');
                const personalityInput = document.getElementById('personalityInput');
                const scenarioInput = document.getElementById('scenarioInput');
                const memoryInput = document.getElementById('memoryInput');
                const tagsInput = document.getElementById('tagsInput');
                const genderChips = document.querySelectorAll('.chip');
                const resetBtn = document.getElementById('resetBtn');
                const activateBtn = document.getElementById('activateBtn');

                function updateCounters() {
                    document.getElementById('greetingCounter').textContent = `${greetingInput.value.length}/200`;
                    document.getElementById('appearanceCounter').textContent = `${appearanceInput.value.length}/500`;
                    document.getElementById('personalityCounter').textContent = `${personalityInput.value.length}/500`;
                    document.getElementById('scenarioCounter').textContent = `${scenarioInput.value.length}/500`;
                    document.getElementById('memoryCounter').textContent = `${memoryInput.value.length}/500`;
                }

                // Сохраняем изменения в tempCharacter
                nameInput.addEventListener('input', (e) => { tempCharacter.name = e.target.value; });
                greetingInput.addEventListener('input', (e) => { tempCharacter.greeting = e.target.value; updateCounters(); });
                appearanceInput.addEventListener('input', (e) => { tempCharacter.appearance = e.target.value; updateCounters(); });
                personalityInput.addEventListener('input', (e) => { tempCharacter.personality = e.target.value; updateCounters(); });
                scenarioInput.addEventListener('input', (e) => { tempCharacter.scenario = e.target.value; updateCounters(); });
                memoryInput.addEventListener('input', (e) => { tempCharacter.memory = e.target.value; updateCounters(); });
                tagsInput.addEventListener('input', (e) => { tempCharacter.tags = e.target.value; });

                genderChips.forEach(chip => {
                    chip.addEventListener('click', () => {
                        genderChips.forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                        tempCharacter.gender = chip.dataset.gender;
                    });
                });

                resetBtn.addEventListener('click', () => {
                    if (currentEditId !== null) {
                        const index = characters.findIndex(c => c.id === currentEditId);
                        if (index !== -1) characters.splice(index, 1);
                        saveCharacters();
                    }
                    // Сброс временного персонажа
                    tempCharacter = {
                        id: null,
                        name: '',
                        gender: 'male',
                        greeting: '',
                        appearance: '',
                        personality: '',
                        scenario: '',
                        memory: '',
                        tags: '',
                        photo: null
                    };
                    renderFeed();
                    document.querySelectorAll('.bar-item').forEach(i => i.classList.remove('active'));
                    document.querySelector('.bar-item[data-tab="feed"]').classList.add('active');
                    tg.HapticFeedback?.impactOccurred('light');
                });

                activateBtn.addEventListener('click', async () => {
                    const name = tempCharacter.name.trim();
                    if (!name) {
                        tg.showAlert('Введите имя персонажа');
                        return;
                    }
                    const updatedData = {
                        id: currentEditId !== null ? currentEditId : Date.now(),
                        name: name,
                        gender: tempCharacter.gender,
                        greeting: tempCharacter.greeting,
                        appearance: tempCharacter.appearance,
                        personality: tempCharacter.personality,
                        scenario: tempCharacter.scenario,
                        memory: tempCharacter.memory,
                        tags: tempCharacter.tags,
                        photo: tempCharacter.photo
                    };
                    if (currentEditId === null) {
                        characters.push(updatedData);
                        saveCharacters();
                    } else {
                        const index = characters.findIndex(c => c.id === currentEditId);
                        if (index !== -1) {
                            characters[index] = { ...characters[index], ...updatedData };
                            saveCharacters();
                        }
                    }
                    try {
                        await fetch('/save_character', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chat_id: chat_id, character: updatedData })
                        });
                    } catch(e) { console.error(e); }

                    const chatKey = `chat_${updatedData.id}`;
                    if (!localStorage.getItem(chatKey)) {
                        localStorage.setItem(chatKey, JSON.stringify([]));
                    }
                    renderChat(updatedData);
                });
            }

            // ---------- Профиль ----------
            function renderProfile() {
                const html = `
                    <div style="text-align: center; padding: 40px 20px;">
                        <i data-lucide="menu" style="width:48px;height:48px;margin-bottom:20px;"></i>
                        <p style="margin-bottom: 30px;">НАСТРОЙКИ</p>
                        <button id="clearDataBtn" style="background: #ff4d4d; border: none; color: white; padding: 12px 24px; border-radius: 40px; font-weight: bold; font-size: 16px; cursor: pointer; width: 80%;">🗑️ Очистить все данные</button>
                        <p style="font-size: 12px; color: #aaa; margin-top: 20px;">Удалятся все персонажи, чаты и фото.</p>
                    </div>
                `;
                contentArea.innerHTML = html;
                lucide.createIcons();
                const clearBtn = document.getElementById('clearDataBtn');
                clearBtn.addEventListener('click', () => {
                    const keysToKeep = ['tgWebAppData', 'tgWebAppPlatform', 'tgWebAppThemeParams', 'tgWebAppVersion'];
                    for (let i = localStorage.length - 1; i >= 0; i--) {
                        const key = localStorage.key(i);
                        if (key && !keysToKeep.includes(key)) {
                            localStorage.removeItem(key);
                        }
                    }
                    characters = [];
                    saveCharacters();
                    tempCharacter = {
                        id: null,
                        name: '',
                        gender: 'male',
                        greeting: '',
                        appearance: '',
                        personality: '',
                        scenario: '',
                        memory: '',
                        tags: '',
                        photo: null
                    };
                    tg.showAlert('Все данные очищены!');
                    renderFeed();
                    document.querySelectorAll('.bar-item').forEach(i => i.classList.remove('active'));
                    document.querySelector('.bar-item[data-tab="feed"]').classList.add('active');
                });
            }

            function renderGames() {
                contentArea.innerHTML = '<div class="placeholder-page"><i data-lucide="layout-grid" style="width:48px;height:48px;margin-bottom:20px;"></i><br>МИНИ-ИГРЫ<br>скоро здесь появятся активности</div>';
                lucide.createIcons();
            }

            // ---------- Переключение вкладок ----------
            const contentArea = document.getElementById('content-area');
            const barItems = document.querySelectorAll('.bar-item');

            barItems.forEach(item => {
                item.addEventListener('click', () => {
                    barItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const tab = item.dataset.tab;
                    if (tab === 'feed') renderFeed();
                    else if (tab === 'chats') renderChats();
                    else if (tab === 'center') renderCenter();
                    else if (tab === 'games') renderGames();
                    else if (tab === 'profile') renderProfile();
                    tg.HapticFeedback?.impactOccurred('light');
                });
            });

            // Сплэш анимация
            const splash = document.getElementById('splash-screen');
            const progressFill = document.getElementById('progress-fill');
            setTimeout(() => progressFill.style.width = '100%', 100);
            setTimeout(() => {
                splash.classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                tg.HapticFeedback?.impactOccurred('medium');
            }, 3200);

            renderFeed();
            barItems[0].classList.add('active');

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
            }
        })();
    </script>
</body>
</html>
