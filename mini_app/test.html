<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test</title>
</head>
<body>
    <h1>Test page</h1>
    <p>If you see this, the file is served correctly.</p>
    <button onclick="test()">Send test request</button>
    <div id="result"></div>
    <script>
        async function test() {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({chat_id:123, message:"hello"})
            });
            const data = await res.json();
            document.getElementById('result').innerText = JSON.stringify(data);
        }
    </script>
</body>
</html>
