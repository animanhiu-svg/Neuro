<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест чата</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h3>Тест /chat</h3>
    <input id="msg" placeholder="Сообщение">
    <button onclick="send()">Отправить</button>
    <div id="result"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        const chatId = tg.initDataUnsafe.user?.id || 0;

        async function send() {
            const msg = document.getElementById('msg').value;
            if (!msg) return;
            const response = await fetch('https://neuro-12pd.onrender.com/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, message: msg })
            });
            const data = await response.json();
            document.getElementById('result').innerText = data.reply || 'Ошибка';
        }
    </script>
</body>
</html>
